name: Live standings

# Pulls live World Cup group tables from football-data.org every few minutes
# and commits standings.json. The Pages deploy workflow redeploys on the push,
# and the open page polls standings.json on its own, so the table stays current.

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may delay during high load)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: live-standings
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live standings
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python live_standings.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in standings.json results.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "No standings changes."
          else
            git commit -m "chore: live standings + results update"
            git pull --rebase --autostash origin main
            git push
          fi
