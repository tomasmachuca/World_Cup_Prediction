name: Deploy to GitHub Pages

# Publishes the static site (index.html + model/fixture/standings JSON) to
# GitHub Pages on every push to main, and after the auto-update workflow
# commits regenerated artifacts.

on:
  push:
    branches: [main]
  # Bot commits (live standings/results, daily retrain) are pushed with the
  # default GITHUB_TOKEN, which by design does NOT trigger the push event
  # above. workflow_run re-deploys once those workflows finish so live data
  # actually reaches the site.
  workflow_run:
    workflows: ["Live standings", "Update predictions & standings"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
