        Orden: puntos → diferencia de gol → goles a favor (el head-to-head no aplica entre grupos distintos). Se actualiza en vivo.</p>
      </div>`;
      return html;
    }

    // ---- Simulador de clasificación (Monte Carlo dinámico) --------------
    // Composición oficial de los 12 grupos (sorteo final, dic 2025).
    const GROUPS = {
      A: ['Czech Republic', 'Mexico', 'South Africa', 'South Korea'],
      B: ['Bosnia and Herzegovina', 'Canada', 'Qatar', 'Switzerland'],
      C: ['Brazil', 'Haiti', 'Morocco', 'Scotland'],
      D: ['Australia', 'Paraguay', 'Turkey', 'United States'],
      E: ['Curaçao', 'Ecuador', 'Germany', 'Ivory Coast'],
      F: ['Japan', 'Netherlands', 'Sweden', 'Tunisia'],
      G: ['Belgium', 'Egypt', 'Iran', 'New Zealand'],
      H: ['Cabo Verde', 'Saudi Arabia', 'Spain', 'Uruguay'],
      I: ['France', 'Iraq', 'Norway', 'Senegal'],
      J: ['Algeria', 'Argentina', 'Austria', 'Jordan'],
      K: ['Colombia', 'DR Congo', 'Portugal', 'Uzbekistan'],
      L: ['Croatia', 'England', 'Ghana', 'Panama'],
    };
    const HOST_SET = new Set(['Mexico', 'United States', 'Canada']);
    const TEAM_GROUP = {};   // equipo -> letra de grupo
    for (const g in GROUPS) GROUPS[g].forEach(t => (TEAM_GROUP[t] = g));

    /** Rival oficial en 16avos de un equipo (de results.json). null si no jugó. */
    function officialR32Opponent(team) {
      if (!resultsData || !resultsData.matches) return null;
      const grp = TEAM_GROUP[team];
      for (const k in resultsData.matches) {
        const v = resultsData.matches[k];
        if (v.stage && v.stage !== 'LAST_32') continue;    // usa la ronda si está
        if (v.home !== team && v.away !== team) continue;
        const other = v.home === team ? v.away : v.home;
        if (TEAM_GROUP[other] !== grp) return other;        // rival de otro grupo = mata-mata
      }
      return null;
    }
    const SIM_RUNS = 8000;

    /** Muestra Poisson (Knuth) — goles de un equipo dado su λ. */
    function poissonSample(lambda) {
      const L = Math.exp(-lambda);
      let k = 0, p = 1;
      do { k++; p *= Math.random(); } while (p > L);
      return k - 1;
    }

    /** λ de cada lado con ventaja de anfitrión (igual criterio que el fixture). */
    function simLambdas(home, away) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const haH = HOST_SET.has(home) ? model.homeAdvantage : 0;
      const haA = HOST_SET.has(away) ? model.homeAdvantage : 0;
      return [
        Math.exp((SH[home] || 0) + (SA[away] || 0) + haH),
        Math.exp((SH[away] || 0) + (SA[home] || 0) + haA),
      ];
    }

    /** Marcador real [gA, gB] si el partido ya terminó, orientado a (a,b). */
    function realScore(a, b) {
      if (!resultsData || !resultsData.matches) return null;
      const v = resultsData.matches[[a, b].sort().join('|')];
      if (!v || v.status !== 'FINISHED') return null;
      return v.home === a ? [v.homeGoals, v.awayGoals] : [v.awayGoals, v.homeGoals];
    }

    /** Precalcula los 6 cruces de cada grupo: marcador fijo (ya jugado) o λ. */
    function buildSimPlan() {
      const plan = {};
      let played = 0;
      for (const g in GROUPS) {
        const teams = GROUPS[g], matches = [];
        for (let i = 0; i < 4; i++) for (let j = i + 1; j < 4; j++) {
          const a = teams[i], b = teams[j], rs = realScore(a, b);
          if (rs) { matches.push({ a, b, fixed: rs }); played++; }
          else { const [la, lb] = simLambdas(a, b); matches.push({ a, b, la, lb }); }
        }
        plan[g] = { teams, matches };
      }
      return { plan, played };
    }

    /**
     * Ordena un grupo con las reglas oficiales FIFA 2026: puntos, luego
     * HEAD-TO-HEAD entre los empatados (puntos, DG y GF en sus enfrentamientos
     * directos), y recién después la DG y GF globales. (Antes era al revés.)
     */
    function rankGroup(teams, pts, gd, gf, res) {
      const byPts = teams.slice().sort((x, y) => pts[y] - pts[x]);
      const out = [];
      for (let i = 0; i < byPts.length;) {
        let j = i;
        while (j + 1 < byPts.length && pts[byPts[j + 1]] === pts[byPts[i]]) j++;
        const tied = byPts.slice(i, j + 1);
        if (tied.length > 1) {
          const h = {}; tied.forEach(t => (h[t] = { p: 0, gd: 0, gf: 0 }));
          for (const m of res) {
            if (h[m.a] && h[m.b]) {           // sólo enfrentamientos entre empatados
              h[m.a].gf += m.ga; h[m.a].gd += m.ga - m.gb;
              h[m.b].gf += m.gb; h[m.b].gd += m.gb - m.ga;
              if (m.ga > m.gb) h[m.a].p += 3; else if (m.ga < m.gb) h[m.b].p += 3; else { h[m.a].p++; h[m.b].p++; }
            }
          }
          tied.sort((x, y) =>
            h[y].p - h[x].p || h[y].gd - h[x].gd || h[y].gf - h[x].gf ||
            gd[y] - gd[x] || gf[y] - gf[x] || Math.random() - 0.5);
        }
        out.push(...tied);
        i = j + 1;
      }
      return out;
    }

    /** Corre N simulaciones y agrega % de ganar grupo / clasificar por equipo. */
    function runSimulation(plan, N) {
      const agg = {};
      for (const g in GROUPS) GROUPS[g].forEach(t => (agg[t] = { team: t, group: g, win: 0, adv: 0 }));

      for (let s = 0; s < N; s++) {
        const thirds = [];
        for (const g in plan) {
          const { teams, matches } = plan[g];
          const pts = {}, gd = {}, gf = {}, res = [];
          teams.forEach(t => { pts[t] = gd[t] = gf[t] = 0; });
          for (const m of matches) {
            const ga = m.fixed ? m.fixed[0] : poissonSample(m.la);
            const gb = m.fixed ? m.fixed[1] : poissonSample(m.lb);
            res.push({ a: m.a, b: m.b, ga, gb });
            gf[m.a] += ga; gd[m.a] += ga - gb;
            gf[m.b] += gb; gd[m.b] += gb - ga;
            if (ga > gb) pts[m.a] += 3; else if (ga < gb) pts[m.b] += 3; else { pts[m.a]++; pts[m.b]++; }
          }
          const ranked = rankGroup(teams, pts, gd, gf, res);
          agg[ranked[0]].win++; agg[ranked[0]].adv++;   // 1º: gana grupo + clasifica
          agg[ranked[1]].adv++;                          // 2º: clasifica
          thirds.push({ team: ranked[2], pts: pts[ranked[2]], gd: gd[ranked[2]], gf: gf[ranked[2]] });
        }
        // 8 mejores terceros
        thirds.sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gf - x.gf || Math.random() - 0.5);
        for (let i = 0; i < 8; i++) agg[thirds[i].team].adv++;
      }
      for (const t in agg) { agg[t].winPct = agg[t].win / N * 100; agg[t].advPct = agg[t].adv / N * 100; }
      return agg;
    }

    let chancesKey = '';
    /** Renderiza el simulador; re-corre solo si cambiaron los resultados. */
    function renderChances() {
      if (!modelReady) return;
      const container = document.getElementById('chancesContainer');
      const key = resultsData
        ? (resultsData.updated || '') + ':' + Object.keys(resultsData.matches || {}).length
        : 'none';
      if (key === chancesKey && container.innerHTML) return;   // sin cambios

      container.innerHTML = '<p class="source-note" style="text-align:center;">Simulando 8.000 torneos…</p>';
      // setTimeout para que pinte "Simulando…" antes del cálculo (bloqueante ~1s).
      setTimeout(() => {
        const { plan, played } = buildSimPlan();
        const agg = runSimulation(plan, SIM_RUNS);
        chancesKey = key;
        paintChances(agg, played);
      }, 20);
    }

    function paintChances(agg, played) {
      document.getElementById('chancesMeta').innerHTML =
        `🔮 Simulación Monte Carlo (<b>8.000</b> torneos) de los partidos que faltan, ` +
        `fijando los <b>${played}</b> ya jugados. Se actualiza con cada resultado. ` +
        `<b>%</b> = probabilidad de clasificar (avanzan 2 por grupo + 8 mejores terceros) · ` +
        `🥇 = ganar el grupo.`;
      let html = '';
      for (const g in GROUPS) {
        const rows = GROUPS[g].map(t => agg[t]).sort((a, b) => b.advPct - a.advPct || b.winPct - a.winPct);
        html += `<div class="standings-group"><h3>Grupo ${g}</h3>`;
        rows.forEach((r, i) => {
          const adv = r.advPct, win = r.winPct;
          const grad = adv >= 50 ? '#34d399,#10b981' : (adv >= 20 ? '#f0b429,#f59e0b' : '#8b92a8,#6b7280');
          html += `
            <div class="chance-row${i < 2 ? ' qualify' : ''}">
              <span class="chance-team">${flag(r.team)} ${r.team}</span>
              <span class="bar"><span style="width:${adv.toFixed(0)}%; background:linear-gradient(90deg,${grad})"></span></span>
              <span class="chance-adv">${adv.toFixed(0)}%</span>
              <span class="chance-win">🥇 ${win.toFixed(0)}%</span>
            </div>`;
        });
        html += `</div>`;
      }
      document.getElementById('chancesContainer').innerHTML = html;
    }

    // ---- Cuadro de eliminatorias (proyección dinámica) -----------------
    // Estructura oficial WC2026 (números de partido FIFA). 1X = ganador grupo X,
    // 2X = segundo de X, 3@m = mejor tercero asignado al partido m.
    const R32 = {
      73: [['2', 'A'], ['2', 'B']], 74: [['1', 'E'], ['3', 74]], 75: [['1', 'F'], ['2', 'C']],
      76: [['1', 'C'], ['2', 'F']], 77: [['1', 'I'], ['3', 77]], 78: [['2', 'E'], ['2', 'I']],
      79: [['1', 'A'], ['3', 79]], 80: [['1', 'L'], ['3', 80]], 81: [['1', 'D'], ['3', 81]],
      82: [['1', 'G'], ['3', 82]], 83: [['2', 'K'], ['2', 'L']], 84: [['1', 'H'], ['2', 'J']],
      85: [['1', 'B'], ['3', 85]], 86: [['1', 'J'], ['2', 'H']], 87: [['1', 'K'], ['3', 87]],
      88: [['2', 'D'], ['2', 'G']],
    };
    // Grupos elegibles para el tercero de cada llave (tabla FIFA).
    const THIRD_SLOTS = {
      74: ['A', 'B', 'C', 'D', 'F'], 77: ['C', 'D', 'F', 'G', 'H'], 79: ['C', 'E', 'F', 'H', 'I'],
      80: ['E', 'H', 'I', 'J', 'K'], 81: ['B', 'E', 'F', 'I', 'J'], 82: ['A', 'E', 'H', 'I', 'J'],
      85: ['E', 'F', 'G', 'I', 'J'], 87: ['D', 'E', 'I', 'J', 'L'],
    };
    const R16 = { 89: [74, 77], 90: [73, 75], 91: [76, 78], 92: [79, 80], 93: [83, 84], 94: [81, 82], 95: [86, 88], 96: [85, 87] };
    const QF = { 97: [89, 90], 98: [93, 94], 99: [91, 92], 100: [95, 96] };
    const SF = { 101: [97, 98], 102: [99, 100] };
    const FINAL_M = 104, FINAL_SRC = [101, 102];

    /** P(local gana), P(empate), P(visitante gana) de dos λ (Poisson indep.). */
    function wdl(la, lb) {
      const N = 8, A = [], B = [];
      for (let i = 0; i < N; i++) { A.push(poissonPmf(i, la)); B.push(poissonPmf(i, lb)); }
      let pw = 0, pd = 0, pl = 0;
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
        const p = A[i] * B[j];
        if (i > j) pw += p; else if (i === j) pd += p; else pl += p;
      }
      return [pw, pd, pl];
    }

    /** Tabla proyectada por grupo: resultados reales + puntos esperados del resto. */
    function projectGroups() {
      const stand = {}, thirds = [];
      for (const g in GROUPS) {
        const teams = GROUPS[g], xp = {}, xgd = {}, xgf = {};
        teams.forEach(t => { xp[t] = xgd[t] = xgf[t] = 0; });
        for (let i = 0; i < 4; i++) for (let j = i + 1; j < 4; j++) {
          const a = teams[i], b = teams[j], rs = realScore(a, b);
          if (rs) {
            const [ga, gb] = rs;
            xgf[a] += ga; xgd[a] += ga - gb; xgf[b] += gb; xgd[b] += gb - ga;
            if (ga > gb) xp[a] += 3; else if (ga < gb) xp[b] += 3; else { xp[a]++; xp[b]++; }
          } else {
            const [la, lb] = simLambdas(a, b), [pw, pd] = wdl(la, lb), pl = 1 - pw - pd;
            xp[a] += 3 * pw + pd; xp[b] += 3 * pl + pd;
            xgf[a] += la; xgd[a] += la - lb; xgf[b] += lb; xgd[b] += lb - la;
          }
        }
        const ranked = teams.slice().sort((x, y) => xp[y] - xp[x] || xgd[y] - xgd[x] || xgf[y] - xgf[x]);
        stand[g] = ranked.map(t => ({ team: t, group: g, xp: xp[t], xgd: xgd[t], xgf: xgf[t] }));
        thirds.push(stand[g][2]);
      }
      thirds.sort((x, y) => y.xp - x.xp || y.xgd - x.xgd || y.xgf - x.xgf);
      return { stand, qualThirds: thirds.slice(0, 8) };
    }

    /** Asigna los 8 mejores terceros a sus llaves (matching válido por grupo). */
    function assignThirds(qualThirds) {
      const slots = Object.keys(THIRD_SLOTS).map(Number);
      const groups = qualThirds.map(t => t.group);
      const assign = {}, used = new Set();
      (function bt(si) {
        if (si === slots.length) return true;
        for (const grp of THIRD_SLOTS[slots[si]]) {
          if (groups.includes(grp) && !used.has(grp)) {
            assign[slots[si]] = grp; used.add(grp);
            if (bt(si + 1)) return true;
            used.delete(grp); delete assign[slots[si]];
          }
        }
        return false;
      })(0);
      const byGroup = {}; qualThirds.forEach(t => (byGroup[t.group] = t));
      const out = {}; for (const s in assign) out[s] = byGroup[assign[s]];
      return out;
    }

    /** Ganador REAL de una llave (results.json). null si no se jugó o sin definir. */
    function realKOWinner(a, b) {
      if (!a || !b) return null;
      const rs = realScore(a.team, b.team);
      if (!rs) return null;
      if (rs[0] > rs[1]) return a;
      if (rs[1] > rs[0]) return b;
      return null;   // empate (se define por penales, dato no disponible aún)
    }

    /** Posiciones REALES (standings.json) por grupo + 8 mejores terceros. */
    function realGroupTables() {
      if (!standingsData || !standingsData.groups) return null;
      const stand = {}, thirds = [];
      for (const g in GROUPS) {
        // standings.json ya viene en el orden oficial (football-data aplica las
        // reglas FIFA 2026: head-to-head antes que la diferencia de gol).
        const rows = (standingsData.groups[g] || []);
        if (rows.length < 4) return null;   // tabla incompleta: esperar
        stand[g] = rows.map(r => ({ team: r.team, group: g, pts: r.points, gd: r.gd, gf: r.gf }));
        thirds.push(stand[g][2]);
      }
      thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
      return { stand, qualThirds: thirds.slice(0, 8) };
    }

    /**
     * Arma el cuadro: los 16avos salen de la TABLA REAL (standings.json). Cada
     * llave se PREDICE (con penales) si todavía no se jugó; el ganador predicho
     * se propaga a la ronda siguiente. Cuando hay un resultado REAL, reemplaza
     * a la predicción. meta[m] guarda si es real + la prob de avance.
     */
    function buildBracketTeams(simulate) {
      const tables = realGroupTables();
      if (!tables) return null;
      const { stand, qualThirds } = tables;
      const thirdOf = assignThirds(qualThirds);
      // Corregir la asignación de terceros con los cruces OFICIALES: en cada
      // llave con tercero, el 1° de grupo es fijo, así que su rival real en los
      // 16avos es el tercero verdadero (la tabla FIFA de terceros la resuelve el
      // sorteo; acá la tomamos de los partidos que ya se jugaron).
      [74, 77, 79, 80, 81, 82, 85, 87].forEach(m => {
        const fx = R32[m][0];   // lado fijo (1°X)
        const fixedTeam = fx[0] === '1' ? stand[fx[1]][0] : stand[fx[1]][1];
        if (!fixedTeam) return;
        const opp = officialR32Opponent(fixedTeam.team);
        if (opp && TEAM_GROUP[opp]) thirdOf[m] = { team: opp, group: TEAM_GROUP[opp], pts: 0, gd: 0, gf: 0 };
      });
      const teamOf = ([type, ref]) =>
        type === '1' ? stand[ref][0] : type === '2' ? stand[ref][1] : thirdOf[ref];

      const slot = {}, winner = {}, meta = {};
      const decide = (m, a, b) => {
        slot[m] = [a || null, b || null];
        if (!a || !b) return;
        const real = realKOWinner(a, b);
        if (real) { winner[m] = real; meta[m] = { real: true }; return; }
        if (!simulate) return;   // modo real: las llaves sin jugar quedan vacías
        const pr = koPredict(a.team, b.team);
        const aWins = pr.aAdv >= 0.5;
        winner[m] = aWins ? a : b;
        meta[m] = {
          real: false,
          advPct: Math.round((aWins ? pr.aAdv : 1 - pr.aAdv) * 100),
          drawPct: pr.pX,
          shootWin: Math.round((aWins ? pr.shA : 1 - pr.shA) * 100),
        };
      };
      for (const m in R32) decide(m, teamOf(R32[m][0]), teamOf(R32[m][1]));
      const round = def => { for (const m in def) decide(m, winner[def[m][0]], winner[def[m][1]]); };
      round(R16); round(QF); round(SF);
      decide(FINAL_M, winner[FINAL_SRC[0]], winner[FINAL_SRC[1]]);
      return { slot, winner, meta, champion: winner[FINAL_M] };
    }

    // Orden visual de las columnas: lado izquierdo -> Final -> lado derecho.
    const seedLabel = ([type, ref]) => type === '1' ? `1°${ref}` : type === '2' ? `2°${ref}` : '3°';
    const BK_COLS = [
      { round: 'r32', side: 'l', m: [74, 77, 73, 75, 83, 84, 81, 82] },
      { round: 'r16', side: 'l', m: [89, 90, 93, 94] },
      { round: 'qf', side: 'l', m: [97, 98] },
      { round: 'sf', side: 'l', m: [101] },
      { round: 'final', side: 'c', m: [104] },
      { round: 'sf', side: 'r', m: [102] },
      { round: 'qf', side: 'r', m: [99, 100] },
      { round: 'r16', side: 'r', m: [91, 92, 95, 96] },
      { round: 'r32', side: 'r', m: [76, 78, 79, 80, 86, 88, 85, 87] },
    ];

    let bracketKey = '', bracketSimulate = false, lastBracket = null;
    function toggleBracketSim() {
      bracketSimulate = !bracketSimulate;
      bracketKey = '';   // forzar re-render
      renderBracket();
    }

    /** Detalle de una llave de eliminación (1X2 + avance + penales). */
    function koMatchDetail(aTeam, bTeam) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const la = Math.exp((SH[aTeam] || 0) + (SA[bTeam] || 0));
      const lb = Math.exp((SH[bTeam] || 0) + (SA[aTeam] || 0));
      const [p1, pX, p2] = wdl(la, lb);
      const shA = shootoutWinProb(aTeam, bTeam);
      return { la, lb, p1, pX, p2, shA, aAdv: p1 + pX * shA, bAdv: p2 + pX * (1 - shA) };
    }

    /** Abre el modal con la simulación del partido de la llave m. */
    function showKoModal(m) {
      if (!lastBracket) return;
      const pair = lastBracket.slot[m] || [];
      const a = pair[0], b = pair[1];
      if (!a || !b) return;
      const d = koMatchDetail(a.team, b.team);
      const advTeam = d.aAdv >= 0.5 ? a : b, advPct = Math.round(Math.max(d.aAdv, d.bAdv) * 100);
      const pct = x => (x * 100).toFixed(0) + '%';
      const bar = (p, mx) => `<span class="kom-bar"><span style="width:${Math.min(p / mx * 100, 100).toFixed(0)}%"></span></span>`;
      const rec = (t) => penaltyData && penaltyData.teams[t] ? penaltyData.teams[t] : null;
      const ra = rec(a.team), rb = rec(b.team);
      const penNote = d.pX > 0.12
        ? `<div class="kom-pen">🥅 <b>Si van a penales</b> (${pct(d.pX)} de chance de empate):<br>
             ${flag(a.team)} ${a.team} <b>${pct(d.shA)}</b> — ${flag(b.team)} ${b.team} <b>${pct(1 - d.shA)}</b>
             <div style="color:#8b92a8;font-size:0.9em;margin-top:4px;">Récord de tandas: ${a.team} ${ra ? ra.won + '/' + ra.played : 's/d'} · ${b.team} ${rb ? rb.won + '/' + rb.played : 's/d'}</div>
           </div>` : '';
      const rs = realScore(a.team, b.team);
      const realNote = rs
        ? `<div class="kom-real" style="color:#34d399">✅ Jugado: ${rs[0]} - ${rs[1]} — avanzó ${flag((rs[0] > rs[1] ? a : b).team)} <b>${(rs[0] > rs[1] ? a : b).team}</b></div>` : '';

      document.getElementById('koModalCard').innerHTML = `
        <div class="kom-teams">${flag(a.team)} ${a.team} <span style="color:#555d75">vs</span> ${flag(b.team)} ${b.team}</div>
        <div class="kom-sub">🔮 Simulación del modelo · sede neutral</div>
        <div class="kom-adv">Avanza: ${flag(advTeam.team)} ${advTeam.team} — ${advPct}%</div>
        <div class="kom-row"><span class="kom-lbl">Gana ${a.team}</span>${bar(d.p1, 1)}<span class="kom-val">${pct(d.p1)}</span></div>
        <div class="kom-row"><span class="kom-lbl">Empate → penales</span>${bar(d.pX, 1)}<span class="kom-val">${pct(d.pX)}</span></div>
        <div class="kom-row"><span class="kom-lbl">Gana ${b.team}</span>${bar(d.p2, 1)}<span class="kom-val">${pct(d.p2)}</span></div>
        <div class="kom-sub" style="margin:10px 0 0;">Goles esperados (λ): ${d.la.toFixed(2)} - ${d.lb.toFixed(2)}</div>
        ${penNote}${realNote}
        <button class="kom-close" onclick="closeKoModal()">Cerrar</button>`;
      document.getElementById('koModal').classList.remove('hidden');
    }
    function closeKoModal(e) {
      if (e && e.target.closest('.ko-modal-card')) return;   // click adentro: no cerrar
      document.getElementById('koModal').classList.add('hidden');
    }
    function renderBracket() {
      if (!modelReady) return;
      const container = document.getElementById('bracketContainer');
      const su = standingsData ? (standingsData.updated || '') : '';
      const ru = resultsData ? (resultsData.updated || '') + ':' + Object.keys(resultsData.matches || {}).length : '';
      const key = su + '|' + ru + '|' + bracketSimulate;
      if (key === bracketKey && container.innerHTML) { setTimeout(drawConnectors, 40); return; }
      bracketKey = key;
      document.getElementById('bracketChampion').innerHTML = '';

      const btn = document.getElementById('bracketSimBtn');
      btn.textContent = bracketSimulate ? '📋 Volver al cuadro real' : '🔮 Simular el cuadro';
      btn.classList.toggle('on', bracketSimulate);

      const built = buildBracketTeams(bracketSimulate);
      lastBracket = built;
      if (!built) {
        document.getElementById('bracketMeta').innerHTML = '🏆 Cuadro oficial del Mundial 2026.';
        container.innerHTML = '<p class="source-note" style="text-align:center;">Esperando la tabla de posiciones en vivo…</p>';
        return;
      }
      const { slot, winner, meta, champion } = built;
      document.getElementById('bracketMeta').innerHTML = (bracketSimulate
        ? `🔮 <b>Cuadro simulado</b>. Cada llave está predicha (✦ ganador, % = prob. de avanzar); los <b>empates van a ` +
          `penales</b> según el récord histórico de tandas de cada selección (🥅). Tocá "Volver al cuadro real" para ver solo lo jugado.`
        : `🏆 <b>Cuadro real</b>. Los <b>16avos</b> salen de la tabla real; las rondas se llenan a medida que se juegan. ` +
          `Tocá "Simular el cuadro" para la proyección completa.`) +
        ` <b>👆 Tocá cualquier cruce para simular ese partido.</b> <span class="bk-hint">↔ deslizá.</span>`;

      const teamRow = (t, seed, side, m) => {
        const name = t ? t.team : '—';
        const mt = meta[m] || {};
        const isWin = t && winner[m] && winner[m].team === t.team;
        const cls = `bk-team${t ? '' : ' empty'}${isWin ? (mt.real ? ' win' : ' win pred') : ''}`;
        const seedHtml = seed ? `<span class="bk-seed">${seed}</span>` : '';
        const mark = (isWin && !mt.real) ? '✦ ' : '';
        const nameHtml = `<span class="bk-name">${mark}${t ? flag(t.team) + ' ' : ''}${name}</span>`;
        // % de avance + 🥅 si la llave tiene chances reales de ir a penales
        let adv = '';
        if (isWin && !mt.real) {
          const pen = mt.drawPct > 0.26 ? ` <span class="bk-pen" title="Si va a penales, ${mt.shootWin}% de ganar la tanda">🥅</span>` : '';
          adv = `<span class="bk-adv">${mt.advPct}%${pen}</span>`;
        }
        return `<div class="${cls}">${side === 'r' ? nameHtml + adv + seedHtml : seedHtml + nameHtml + adv}</div>`;
      };
      const matchBox = (m, side) => {
        const [a, b] = slot[m] || [null, null];
        const seeds = R32[m] ? [seedLabel(R32[m][0]), seedLabel(R32[m][1])] : ['', ''];
        return `<div class="bk-match" data-m="${m}">${teamRow(a, seeds[0], side, m)}${teamRow(b, seeds[1], side, m)}</div>`;
      };

      document.getElementById('bracketChampion').innerHTML = champion ? `
        <div class="champion-banner">
          <div class="lbl">🏆 Campeón proyectado</div>
          <div class="champ">${flag(champion.team)} ${champion.team}</div>
        </div>` : '';

      let cols = '';
      for (const c of BK_COLS) {
        cols += `<div class="bk-col bk-${c.round} side-${c.side}">`;
        for (const m of c.m) cols += matchBox(m, c.side);
        cols += `</div>`;
      }
      container.innerHTML = `<div class="bk-scroll"><div class="bk" id="bkInner"><svg class="bk-lines" id="bkLines"></svg>${cols}</div></div>`;
      document.getElementById('bkInner').addEventListener('click', e => {
        const box = e.target.closest('.bk-match');
        if (box) showKoModal(+box.dataset.m);
      });
      setTimeout(drawConnectors, 40);
    }

    /** Dibuja los conectores del cuadro midiendo la posición de cada llave. */
    function drawConnectors() {
      const bk = document.getElementById('bkInner'), svg = document.getElementById('bkLines');
      if (!bk || !svg) return;
      const base = bk.getBoundingClientRect();
      const rel = [];
      const add = def => { for (const t in def) def[t].forEach(f => rel.push([+t, +f])); };
      add(R16); add(QF); add(SF); rel.push([FINAL_M, FINAL_SRC[0]], [FINAL_M, FINAL_SRC[1]]);
      let d = '';
      for (const [t, f] of rel) {
        const tb = bk.querySelector(`[data-m="${t}"]`), fb = bk.querySelector(`[data-m="${f}"]`);
        if (!tb || !fb) continue;
        const tr = tb.getBoundingClientRect(), fr = fb.getBoundingClientRect();
        const fy = fr.top + fr.height / 2 - base.top, ty = tr.top + tr.height / 2 - base.top;
        let fx, tx;
        if (fr.left < tr.left) { fx = fr.right - base.left; tx = tr.left - base.left; }
        else { fx = fr.left - base.left; tx = tr.right - base.left; }
        const mx = (fx + tx) / 2;
        d += `<path d="M${fx} ${fy} H${mx} V${ty} H${tx}"/>`;
      }
      svg.setAttribute('width', bk.scrollWidth);
      svg.setAttribute('height', bk.scrollHeight);
      svg.innerHTML = d;
    }
    window.addEventListener('resize', () => {
      if (modelReady && !document.getElementById('bracketPanel').classList.contains('hidden')) drawConnectors();
    });

    // ---- Backtest: modelo vs mercado (Pinnacle closing) ----------------
    let backtestData = null;
    async function loadBacktest() {
      if (backtestData) return;
      try { const r = await fetch('backtest.json'); if (r.ok) backtestData = await r.json(); } catch (e) {}
    }
    function renderBacktest() {
      const c = document.getElementById('backtestContainer');
      if (!backtestData) {
        c.innerHTML = '<p class="source-note" style="text-align:center;">Cargando backtest…</p>';
        loadBacktest().then(() => { if (backtestData) renderBacktest(); });
        return;
      }
      const d = backtestData, h = d.headline, b = d.baselines;
      const cls = v => v >= 0 ? 'pos' : 'neg';
      const pct = v => (v >= 0 ? '+' : '') + v + '%';

      // Curva de bankroll (SVG).
      const curve = d.bankrollCurve, W = 600, H = 190, pad = 10;
      const mn = Math.min(0, ...curve), mx = Math.max(0, ...curve);
      const X = i => pad + i / (curve.length - 1) * (W - 2 * pad);
      const Y = v => pad + (mx - v) / ((mx - mn) || 1) * (H - 2 * pad);
      const pts = curve.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
      const last = curve[curve.length - 1];
      const chart = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">
        <line x1="${pad}" x2="${W - pad}" y1="${Y(0).toFixed(1)}" y2="${Y(0).toFixed(1)}"
          stroke="rgba(255,255,255,0.25)" stroke-dasharray="4"/>
        <polyline points="${pts}" fill="none" stroke="${last >= 0 ? '#34d399' : '#f87171'}" stroke-width="2"/>
      </svg>`;

      const edgeRows = d.byEdge.map(r =>
        `<tr><td class="k">edge &gt; ${(r.edge * 100).toFixed(0)}%</td><td>${r.bets}</td>
         <td class="${r.roi >= 0 ? 'bt-pos' : 'bt-neg'}">${pct(r.roi)}</td><td>${r.hitRate}%</td></tr>`).join('');
      const exRows = d.examples.map(e =>
        `<div class="bt-ex">${e.won ? '✅' : '❌'} <b>${e.pick}</b> · ${e.match} — modelo ${e.modelProb}% vs justa ${e.fairProb}% @ cuota ${e.odd}</div>`).join('');

      const q = d.predictionQuality, betterAcc = q.model.acc >= q.market.acc, lowerBrier = q.model.brier <= q.market.brier;

      c.innerHTML = `
        <div class="bt-title">📈 El modelo vs el mercado · ${d.competition || 'Mundial'}</div>
        <p class="source-note" style="margin-top:0;">
          Validación <b>sin leakage</b>: las calificaciones (Elo walk-forward) se aprenden de <b>todos</b> los
          partidos internacionales, pero el modelo se <b>evalúa solo en los ${q.n} partidos del Mundial</b> que
          tienen cuotas de <b>Pinnacle closing</b> (el mercado más afilado del mundo).
        </p>

        <p class="source-note" style="margin-bottom:4px;"><b>1) Calidad de predicción</b> (métrica estable, no depende de la varianza de apostar):</p>
        <div class="bt-stats" style="grid-template-columns:1fr 1fr;">
          <div class="bt-stat">
            <div class="v">${q.model.acc}%</div><div class="l">MODELO · acierto</div>
            <div class="l">Brier ${q.model.brier}</div>
          </div>
          <div class="bt-stat">
            <div class="v">${q.market.acc}%</div><div class="l">MERCADO · acierto</div>
            <div class="l">Brier ${q.market.brier}</div>
          </div>
        </div>
        <p class="source-note" style="margin-top:0;">
          Brier más bajo = mejor. El mercado predice ${lowerBrier ? 'parecido o peor que' : 'mejor que'} el modelo
          (${q.market.acc}% vs ${q.model.acc}% de acierto), lo esperable: Pinnacle es dificilísimo de superar. El modelo queda en el mismo orden.
        </p>

        <p class="source-note" style="margin:16px 0 4px;"><b>2) ¿Y si apostáramos al "valor"?</b> (muestra chica de un Mundial, alta varianza):</p>
        <div class="bt-stats">
          <div class="bt-stat"><div class="v ${cls(h.roi)}">${pct(h.roi)}</div><div class="l">ROI (yield)</div></div>
          <div class="bt-stat"><div class="v">${h.hitRate}%</div><div class="l">acierto (${h.bets} bets)</div></div>
          <div class="bt-stat"><div class="v ${cls(h.profit)}">${h.profit}u</div><div class="l">ganancia neta</div></div>
        </div>
        <div class="bt-chart"><div class="source-note" style="margin:0 0 6px;">Curva de bankroll (unidades acumuladas)</div>${chart}</div>
        <table class="bt-table">
          <tr><th class="k" style="text-align:left">Estrategia</th><th>apuestas</th><th>ROI</th><th>acierto</th></tr>
          <tr><td class="k"><b>Value del modelo</b></td><td>${h.bets}</td><td class="${h.roi>=0?'bt-pos':'bt-neg'}"><b>${pct(h.roi)}</b></td><td>${h.hitRate}%</td></tr>
          <tr><td class="k">Apostar al favorito</td><td>${b.betFavourite.bets}</td><td class="${b.betFavourite.roi>=0?'bt-pos':'bt-neg'}">${pct(b.betFavourite.roi)}</td><td>${b.betFavourite.hitRate}%</td></tr>
          <tr><td class="k">Apostar el pick del modelo</td><td>${b.betModelPick.bets}</td><td class="${b.betModelPick.roi>=0?'bt-pos':'bt-neg'}">${pct(b.betModelPick.roi)}</td><td>${b.betModelPick.hitRate}%</td></tr>
        </table>
        <p class="source-note" style="margin-bottom:4px;">Ejemplos de apuestas de valor detectadas:</p>
        ${exRows}
        <p class="source-note" style="margin-top:14px;">
          <b>Conclusión honesta:</b> en el único Mundial con cuotas (2022, recordado por sus batacazos), el mercado
          predijo algo mejor que el modelo y las apuestas de valor <b>perdieron plata</b> (ROI ${pct(h.roi)}).
          Es una muestra <b>chica (${q.n} partidos) y muy ruidosa</b>, así que no es concluyente — pero la lectura
          sincera es que el modelo <b>no tiene una ventaja demostrable</b> contra el mercado en el Mundial.
          No inventé un "sistema ganador": medí con rigor y reporto la verdad. Solo informativo · apostá con responsabilidad.
        </p>`;
    }

    window.addEventListener('load', () => {
      applyTheme();
      loadModel();
      document.getElementById('fixtureProbsToggle').addEventListener('change', renderFixture);

      // Refresco en vivo de las posiciones: vuelve a pedir standings.json cada
      // 45 s (solo cuando la pestaña del navegador está visible, para no gastar
      // pedidos de fondo). El workflow live-standings la regenera en el server.
      setInterval(async () => {
        if (!modelReady || document.visibilityState !== 'visible') return;
        await loadStandings();
        if (fixtureData) { await loadResults(); renderFixture(); }
        // Si Chances o Cuadro están abiertos, recalculan (solo si cambiaron los resultados).
        if (!document.getElementById('chancesPanel').classList.contains('hidden')) renderChances();
        if (!document.getElementById('bracketPanel').classList.contains('hidden')) renderBracket();
      }, 45000);
    });
  </script>
</body>
</html>
