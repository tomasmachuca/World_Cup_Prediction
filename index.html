<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 — Match Predictor (By Tomas Machuca)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1040 50%, #0a0e1a 100%);
      color: #f0f2f8;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(26, 31, 53, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(240, 180, 41, 0.3);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #8b92a8;
      font-size: 1.1em;
      margin-bottom: 20px;
    }

    .status-badge {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(52, 211, 153, 0.2);
      border: 1px solid rgba(52, 211, 153, 0.5);
      border-radius: 20px;
      color: #34d399;
      font-weight: bold;
      font-size: 0.9em;
    }

    .card {
      background: rgba(26, 31, 53, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #8b92a8;
      font-weight: 500;
      font-size: 0.95em;
    }

    select {
      width: 100%;
      padding: 12px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      color: #f0f2f8;
      font-size: 1em;
      cursor: pointer;
    }
    /* Opciones del desplegable nativo: fondo sólido para que se lean. */
    select option { background-color: #141a30; color: #f0f2f8; }

    select:hover {
      border-color: rgba(34, 211, 238, 0.6);
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      border: none;
      border-radius: 8px;
      color: #0a0e1a;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(240, 180, 41, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result-box {
      background: rgba(34, 211, 238, 0.1);
      border: 2px solid #22d3ee;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .result-title {
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 15px;
      color: #22d3ee;
    }

    .probability-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 15px;
    }

    .probability-item {
      text-align: center;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .prob-label {
      color: #8b92a8;
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    .prob-value {
      font-size: 1.8em;
      font-weight: bold;
      color: #f0b429;
    }

    .expected-goals {
      padding: 12px;
      background: rgba(52, 211, 153, 0.1);
      border-left: 3px solid #34d399;
      border-radius: 4px;
      color: #34d399;
    }

    #recommendation {
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 10px;
    }

    .source-note {
      text-align: center;
      color: #555d75;
      font-size: 0.8em;
      margin-top: 12px;
    }

    .hidden {
      display: none;
    }

    .group-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .gchip {
      width: auto;
      padding: 6px 11px;
      font-size: 0.85em;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      color: #8b92a8;
      cursor: pointer;
    }
    .gchip:hover { transform: none; box-shadow: none; border-color: rgba(34, 211, 238, 0.5); }
    .gchip.active {
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      color: #0a0e1a;
      border-color: transparent;
    }
    body.light .gchip { background: #eef1f8; color: #5b6478; border-color: rgba(0,0,0,0.1); }
    body.light .gchip.active { color: #0a0e1a; }

    .flag {
      width: 20px;
      height: 14px;
      object-fit: cover;
      border-radius: 2px;
      vertical-align: middle;
      flex-shrink: 0;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.25);
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: rgba(26, 31, 53, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #8b92a8;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
      width: auto;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      color: #0a0e1a;
      border-color: transparent;
    }

    .tab-btn:hover { transform: none; box-shadow: none; }

    .fixture-day {
      margin-bottom: 22px;
    }

    .fixture-day-header {
      color: #22d3ee;
      font-weight: 700;
      font-size: 1.05em;
      margin: 0 0 10px 4px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.25);
    }

    .fixture-match {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-left: 4px solid #555d75;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .dc-tip {
      margin-top: 6px;
      font-size: 0.8em;
      color: #34d399;
      background: rgba(52, 211, 153, 0.1);
      border-radius: 6px;
      padding: 4px 8px;
      display: inline-block;
    }
    .ko-pred {
      margin-top: 6px; font-size: 0.85em; color: #f0b429; font-weight: 600;
      background: rgba(240, 180, 41, 0.1); border-radius: 6px; padding: 4px 8px; display: inline-block;
    }
    .ko-pred.done { color: #34d399; background: rgba(52, 211, 153, 0.1); }
    .ko-pred b { color: inherit; }
    .dc-tip b { color: #34d399; font-weight: 800; }

    .stakes {
      margin-top: 6px;
      font-size: 0.82em;
      font-weight: 600;
      color: #f0b429;
      background: rgba(240, 180, 41, 0.1);
      border-radius: 6px;
      padding: 4px 9px;
      display: inline-block;
    }
    body.light .stakes { color: #b87a00; background: rgba(240, 180, 41, 0.16); }

    .fixture-teams { font-weight: 600; font-size: 1.02em; }
    .fixture-meta { color: #8b92a8; font-size: 0.8em; margin-top: 3px; }
    .fixture-probs { color: #8b92a8; font-size: 0.82em; margin-top: 5px; }
    .fixture-pick {
      text-align: center;
      min-width: 64px;
    }
    .pick-code { font-size: 1.6em; font-weight: 800; line-height: 1; }
    .pick-conf { font-size: 0.72em; color: #8b92a8; }
    .pick-1 { border-left-color: #34d399 !important; }
    .pick-X { border-left-color: #f0b429 !important; }
    .pick-2 { border-left-color: #22d3ee !important; }

    .fixture-score { color: #f0f2f8; font-size: 0.9em; margin-top: 5px; }
    .fixture-score b { color: #fff; font-size: 1.05em; }
    .live-tag { color: #f87171; font-weight: 700; font-size: 0.82em; }
    .host-tag { color: #34d399; font-weight: 700; }

    .verdict { font-size: 1.5em; font-weight: 900; line-height: 1; margin-top: 4px; }
    .verdict.ok { color: #34d399; }
    .verdict.bad { color: #f87171; }

    /* Tinte sutil del partido ya jugado según si el modelo acertó. */
    .fixture-match.done-ok { background: rgba(52, 211, 153, 0.07); }
    .fixture-match.done-bad { background: rgba(248, 113, 113, 0.07); }

    /* Predictor enriquecido: resultados exactos + mercados. */
    .extra-stats {
      margin-top: 16px;
    }

    .why {
      background: rgba(255, 255, 255, 0.04);
      border-left: 3px solid #22d3ee;
      border-radius: 6px;
      padding: 12px 14px;
      margin-top: 14px;
      font-size: 0.92em;
      line-height: 1.55;
      color: #cdd2e0;
    }
    .why.clear { border-left-color: #34d399; }
    .why.tight { border-left-color: #f0b429; }
    .why b { color: #f0f2f8; }

    .analytics-toggle {
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.35);
      border-radius: 8px;
      color: #22d3ee;
      font-weight: 700;
      font-size: 0.95em;
      cursor: pointer;
    }
    .analytics-toggle:hover { transform: none; box-shadow: none; background: rgba(34, 211, 238, 0.18); }
    .analytics-toggle.on { background: rgba(240, 180, 41, 0.18); border-color: rgba(240, 180, 41, 0.5); color: #f0b429; }
    #analyticsPanel { margin-top: 12px; }
    .an-block { margin-bottom: 14px; }
    .an-title { color: #8b92a8; font-size: 0.82em; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
    .an-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 0.9em; }
    .an-name { flex: 1; color: #cdd2e0; display: flex; align-items: center; gap: 6px; }
    .an-val { width: 38px; text-align: right; font-weight: 800; color: #22d3ee; }
    .an-bar { width: 45%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
    .an-bar > span { display: block; height: 100%; background: linear-gradient(90deg, #22d3ee, #0ea5b7); }
    body.light .an-name { color: #41485c; }
    body.light .an-bar { background: rgba(0,0,0,0.08); }

    /* ---- Apuestas recomendadas (en el predictor) ---- */
    #betsBlock { margin-top: 16px; }
    .bets-title { color: #f0b429; font-weight: 800; font-size: 1.05em; margin-bottom: 12px; }
    .bet-row {
      padding: 10px 12px; margin-bottom: 9px; border-radius: 8px;
      border-left: 4px solid #555d75; background: rgba(255,255,255,0.04);
    }
    body.light .bet-row { background: rgba(0,0,0,0.03); }
    .bet-row.safe { border-left-color: #34d399; }
    .bet-row.medium { border-left-color: #f0b429; }
    .bet-row.risky { border-left-color: #f87171; }
    .bet-tierhead { font-size: 0.82em; font-weight: 800; margin-bottom: 4px; }
    .bet-row.safe .bet-tierhead { color: #34d399; }
    .bet-row.medium .bet-tierhead { color: #f0b429; }
    .bet-row.risky .bet-tierhead { color: #f87171; }
    .bet-pick { font-weight: 700; font-size: 1.02em; line-height: 1.35; color: #f0f2f8; }
    body.light .bet-pick { color: #1a1f35; }
    .bet-num { color: #8b92a8; font-size: 0.85em; margin-top: 4px; }
    .bet-num b { color: #f0f2f8; }
    body.light .bet-num b { color: #1a1f35; }
    body.light .why b { color: #1a1f35; }
    body.light .why { color: #41485c; }
    .extra-block {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .extra-title {
      color: #8b92a8;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.92em;
    }
    .score-label { width: 64px; font-weight: 700; color: #f0f2f8; }
    .bar {
      flex: 1;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar > span { display: block; height: 100%; background: linear-gradient(90deg, #f0b429, #f59e0b); }
    .score-pct { width: 46px; text-align: right; color: #f0b429; font-weight: 700; }

    /* ---- Tracker de precisión del modelo (Fixture) ---- */
    .tracker {
      background: rgba(52, 211, 153, 0.08);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: baseline;
    }
    .tracker .t-main { font-size: 1.15em; font-weight: 800; color: #34d399; }
    .tracker .t-sub { color: #8b92a8; font-size: 0.85em; }
    .tracker b { color: #f0f2f8; }

    /* ---- Simulador de clasificación (Chances) ---- */
    .chance-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 2px;
      font-size: 0.9em;
    }
    .chance-team { width: 130px; font-weight: 600; color: #f0f2f8; flex-shrink: 0; }
    .chance-adv { width: 42px; text-align: right; font-weight: 800; color: #f0f2f8; }
    .chance-win { width: 64px; text-align: right; color: #8b92a8; font-size: 0.85em; }
    .chance-row.qualify .chance-team { color: #34d399; }

    /* ---- Cuadro tradicional (bracket horizontal con conectores) ---- */
    .bk-hint { color: #555d75; font-size: 0.9em; }
    .bk-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; }
    .bk {
      position: relative;
      display: flex;
      align-items: stretch;
      min-width: 1000px;
    }
    .bk-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1 1 0;
      min-width: 108px;
      padding: 0 9px;
      position: relative;
      z-index: 1;
    }
    .bk-col.bk-final { justify-content: center; }
    .bk-match {
      background: rgba(26, 31, 53, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      overflow: hidden;
      margin: 3px 0;
    }
    .bk-final .bk-match { border-color: rgba(240, 180, 41, 0.55); }
    .bk-team {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      font-size: 0.74em;
      white-space: nowrap;
    }
    .bk-team + .bk-team { border-top: 1px solid rgba(255, 255, 255, 0.08); }
    .bk-seed { color: #555d75; font-size: 0.82em; font-weight: 700; min-width: 22px; flex-shrink: 0; }
    .bk-name { color: #e6e9f2; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
    .bk-team.empty .bk-name { color: #4a5169; font-weight: 500; }
    .bk-team.win { background: rgba(52, 211, 153, 0.14); }
    .bk-team.win .bk-name { color: #34d399; font-weight: 800; }
    /* Ganador PREDICHO (aún no jugado): ámbar en vez de verde. */
    .bk-team.win.pred { background: rgba(240, 180, 41, 0.13); }
    .bk-team.win.pred .bk-name { color: #f0b429; }
    .bk-adv { color: #8b92a8; font-size: 0.82em; font-weight: 700; flex-shrink: 0; margin-left: auto; }
    .side-r .bk-adv { margin-left: 0; margin-right: auto; }
    .bk-pen { cursor: help; }
    .side-r .bk-team { flex-direction: row-reverse; }
    .bk-lines { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0; }

    .champion-banner {
      text-align: center;
      background: linear-gradient(135deg, rgba(240,180,41,0.18), rgba(245,158,11,0.10));
      border: 1px solid rgba(240, 180, 41, 0.5);
      border-radius: 12px; padding: 14px; margin-bottom: 16px;
    }
    .champion-banner .lbl { color: #8b92a8; font-size: 0.85em; letter-spacing: 0.04em; }
    .champion-banner .champ { font-size: 1.5em; font-weight: 900; color: #f0b429; margin-top: 4px; }
    .champion-banner .champ .flag { width: 30px; height: 21px; }

    .bk-match { cursor: pointer; }
    .bk-match:hover { outline: 1px solid rgba(34, 211, 238, 0.55); }
    .ko-modal {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .ko-modal.hidden { display: none; }   /* debe ganar sobre el display:flex de arriba */
    .ko-modal-card {
      background: #141a30; border: 1px solid rgba(34, 211, 238, 0.35);
      border-radius: 14px; padding: 20px; max-width: 380px; width: 100%;
    }
    body.light .ko-modal-card { background: #ffffff; border-color: rgba(0,0,0,0.15); }
    .kom-teams { font-size: 1.15em; font-weight: 800; text-align: center; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; flex-wrap: wrap; }
    .kom-sub { text-align: center; color: #8b92a8; font-size: 0.85em; margin-bottom: 14px; }
    .kom-adv { text-align: center; font-size: 1.1em; font-weight: 800; color: #f0b429; margin-bottom: 14px; }
    .kom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 0.92em; }
    .kom-lbl { flex: 1; color: #cdd2e0; }
    body.light .kom-lbl { color: #41485c; }
    .kom-bar { width: 42%; height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
    body.light .kom-bar { background: rgba(0,0,0,0.08); }
    .kom-bar > span { display: block; height: 100%; background: linear-gradient(90deg, #22d3ee, #0ea5b7); }
    .kom-val { width: 42px; text-align: right; font-weight: 800; color: #22d3ee; }
    .kom-pen { margin-top: 12px; padding: 10px 12px; background: rgba(240,180,41,0.1); border-radius: 8px; font-size: 0.88em; color: #cdd2e0; }
    body.light .kom-pen { color: #41485c; }
    .kom-close { width: 100%; margin-top: 16px; padding: 10px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: inherit; cursor: pointer; font-weight: 700; }
    .kom-real { margin-top: 12px; text-align: center; font-weight: 700; }

    /* ===================== MOBILE (mobile-first pass) ===================== */
    @media (max-width: 600px) {
      body { padding: 12px; }
      header { padding: 20px 14px; margin-bottom: 24px; }
      h1 { font-size: 1.6em; }
      .subtitle { font-size: 0.95em; }
      .card { padding: 16px; }

      /* Pestañas: que no se aprieten ni desborden. */
      .tabs { flex-wrap: wrap; }
      .tab-btn { font-size: 0.9em; padding: 10px; }

      /* Probabilidades 1/X/2 en una sola fila más compacta. */
      .probability-grid { gap: 8px; }
      .probability-item { padding: 10px 6px; }
      .prob-value { font-size: 1.35em; }
      #recommendation { font-size: 1.1em; }

      /* Tablas de posiciones: scroll horizontal en vez de desbordar. */
      .standings-group { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table.standings { min-width: 480px; font-size: 0.82em; }

      /* Fixture: pick un poco más chico. */
      .pick-code { font-size: 1.35em; }
      .verdict { font-size: 1.3em; }
    }

    .fixture-kick {
      color: #f0b429;
      font-weight: 700;
      font-size: 0.82em;
    }

    .standings-group { margin-bottom: 22px; }
    .standings-group h3 {
      color: #22d3ee;
      font-size: 1.05em;
      margin: 0 0 8px 2px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.25);
    }
    table.standings {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86em;
    }
    table.standings th, table.standings td {
      padding: 7px 6px;
      text-align: center;
    }
    table.standings th {
      color: #8b92a8;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    table.standings td.team {
      text-align: left;
      font-weight: 600;
    }
    table.standings td.pts { font-weight: 800; color: #f0b429; }
    table.standings tr.qualify td { background: rgba(52, 211, 153, 0.08); }
    table.standings tr td:first-child { border-left: 3px solid transparent; }
    table.standings tr.qualify td:first-child { border-left-color: #34d399; }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid rgba(240, 180, 41, 0.2);
      border-top: 4px solid #f0b429;
      border-radius: 50%;
      width: 40px;

  <script>
    let model = null;
    let modelReady = false;
    let statsModel = null;   // corners/tarjetas esperadas (stats_model.json)

    // Código ISO (flagcdn) por selección. Banderas reales, también en Windows.
    const FLAGS = {
      'Mexico': 'mx', 'South Africa': 'za', 'South Korea': 'kr', 'Czech Republic': 'cz',
      'Canada': 'ca', 'Bosnia and Herzegovina': 'ba', 'Qatar': 'qa', 'Switzerland': 'ch',
      'Brazil': 'br', 'Haiti': 'ht', 'Morocco': 'ma', 'Scotland': 'gb-sct',
      'Australia': 'au', 'Paraguay': 'py', 'Turkey': 'tr', 'United States': 'us',
      'Germany': 'de', 'Curaçao': 'cw', 'Netherlands': 'nl', 'Japan': 'jp',
      'Ivory Coast': 'ci', 'Ecuador': 'ec', 'Sweden': 'se', 'Tunisia': 'tn',
      'Spain': 'es', 'Cabo Verde': 'cv', 'Belgium': 'be', 'Egypt': 'eg',
      'Saudi Arabia': 'sa', 'Uruguay': 'uy', 'Iran': 'ir', 'New Zealand': 'nz',
      'France': 'fr', 'Senegal': 'sn', 'Iraq': 'iq', 'Norway': 'no',
      'Argentina': 'ar', 'Algeria': 'dz', 'Austria': 'at', 'Jordan': 'jo',
      'Portugal': 'pt', 'DR Congo': 'cd', 'England': 'gb-eng', 'Croatia': 'hr',
      'Ghana': 'gh', 'Panama': 'pa', 'Uzbekistan': 'uz', 'Colombia': 'co',
      'Cape Verde Islands': 'cv',   // alias por si llega sin normalizar
    };
    /** <img> de bandera para una selección (vacío si no la conocemos). */
    function flag(team) {
      const c = FLAGS[team];
      return c ? `<img class="flag" src="https://flagcdn.com/w40/${c}.png" alt="" loading="lazy">` : '';
    }

    /** Alterna tema claro/oscuro y lo recuerda. */
    function toggleTheme() {
      const light = !document.body.classList.contains('light');
      document.body.classList.toggle('light', light);
      document.getElementById('themeToggle').textContent = light ? '☀️' : '🌙';
      try { localStorage.setItem('wc26theme', light ? 'light' : 'dark'); } catch (e) {}
    }
    function applyTheme() {
      let t = 'dark';
      try { t = localStorage.getItem('wc26theme') || 'dark'; } catch (e) {}
      if (t === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeToggle').textContent = '☀️';
      }
    }

    /**
     * Carga el modelo preentrenado desde model.json
     */
    async function loadModel() {
      try {
        document.getElementById('loadingPanel').classList.remove('hidden');

        const response = await fetch('model/model.json');
        if (!response.ok) throw new Error('No se pudo cargar model.json');

        const data = await response.json();
        console.log('✓ Modelo cargado:', data.version);

        model = {
          version: data.version,
          teamStrengthHome: data.teamStrengthHome || {},
          teamStrengthAway: data.teamStrengthAway || {},
          homeAdvantage: data.homeAdvantage ?? 0,
          rho: data.rho ?? 0,
          temperature: data.calibrationTemperature ?? 1,
          matchProbabilities: data.matchProbabilities || {},
          eloRatings: data.eloRatings || {},
          validation: data.validation || {},
          totalTrainingSamples: data.totalTrainingSamples,
          teamsCount: data.teamsCount,
        };

        // Lista de equipos: las 48 selecciones clasificadas (con respaldo).
        const teams = (data.coreSquads && data.coreSquads.length)
          ? data.coreSquads.slice()
          : Object.keys(model.teamStrengthHome);
        teams.sort();

        const homeSelect = document.getElementById('homeTeam');
        const awaySelect = document.getElementById('awayTeam');
        teams.forEach(team => {
          homeSelect.appendChild(new Option(team, team));
          awaySelect.appendChild(new Option(team, team));
        });
        if (teams.includes('Argentina')) homeSelect.value = 'Argentina';
        if (teams.includes('Brazil')) awaySelect.value = 'Brazil';
        else if (teams.length > 1) awaySelect.value = teams[1];

        // Textos dinámicos (sin números inventados).
        const v = model.validation;
        if (v.accuracy != null) {
          document.getElementById('subtitle').textContent =
            `Dixon-Coles + ML Ensemble · Precisión real ${v.accuracy}% (holdout 1X2)`;
          document.getElementById('footerStats').textContent =
            `${model.totalTrainingSamples} partidos · ${model.teamsCount} equipos · ` +
            `Acierto ${v.accuracy}% · Brier ${v.brierScore} · LogLoss ${v.logLoss}`;
        }

        modelReady = true;
        document.getElementById('loadingPanel').classList.add('hidden');
        document.getElementById('tabs').classList.remove('hidden');
        document.getElementById('formPanel').classList.remove('hidden');
        const badge = document.getElementById('statusBadge');
        badge.textContent = '✓ Listo';
        badge.style.background = 'rgba(52, 211, 153, 0.2)';
        badge.style.color = '#34d399';

        loadFixture();      // pre-carga en segundo plano
        loadStandings();
        loadStatsModel();
        loadPenalties();
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingPanel').classList.add('hidden');
        document.getElementById('errorPanel').classList.remove('hidden');
        document.getElementById('errorPanel').textContent = `Error: ${error.message}`;
      }
    }

    /** Poisson PMF: e^-λ · λ^k / k! (k pequeño, sin desbordes). */
    function poissonPmf(k, lambda) {
      let p = Math.exp(-lambda);
      for (let i = 1; i <= k; i++) p *= lambda / i;
      return p;
    }

    /**
     * Probabilidades 1/X/2 en forma cerrada (Dixon-Coles), corrigiendo los
     * marcadores bajos con rho y aplicando calibración por temperatura.
     * Usa correctamente la DEFENSA del rival (teamStrengthAway = -defensa).
     */
    function dixonColesProbs(home, away, neutral) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const ha = neutral ? 0 : model.homeAdvantage;
      const lambdaHome = Math.exp((SH[home] || 0) + (SA[away] || 0) + ha);
      const lambdaAway = Math.exp((SH[away] || 0) + (SA[home] || 0));
      const rho = model.rho;
      const N = 10;
      const ph = [], pa = [];
      for (let i = 0; i < N; i++) { ph.push(poissonPmf(i, lambdaHome)); pa.push(poissonPmf(i, lambdaAway)); }

      let p1 = 0, pX = 0, p2 = 0;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          let pij = ph[i] * pa[j];
          if (i === 0 && j === 0) pij *= 1 - lambdaHome * lambdaAway * rho;
          else if (i === 0 && j === 1) pij *= 1 + lambdaHome * rho;
          else if (i === 1 && j === 0) pij *= 1 + lambdaAway * rho;
          else if (i === 1 && j === 1) pij *= 1 - rho;
          if (pij < 0) pij = 0;
          if (i > j) p1 += pij; else if (i === j) pX += pij; else p2 += pij;
        }
      }
      const s = p1 + pX + p2;
      p1 /= s; pX /= s; p2 /= s;

      // Temperatura: p^(1/T) renormalizado.
      const T = model.temperature || 1;
      let a = [Math.pow(p1, 1 / T), Math.pow(pX, 1 / T), Math.pow(p2, 1 / T)];
      const sa = a[0] + a[1] + a[2];
      return { p1: a[0] / sa, pX: a[1] / sa, p2: a[2] / sa, lambdaHome, lambdaAway };
    }

    /**
     * Probabilidades 1/X/2 para un cruce. Usa el array pre-calculado del
     * ensemble [p1,pX,p2,p1n,pXn,p2n] si existe; si no, Dixon-Coles en JS.
     */
    function lookupProbs(home, away, neutral) {
      const arr = model.matchProbabilities[`${home}|${away}`];
      if (arr) {
        const o = neutral ? 3 : 0;
        return {
          p1: arr[o] / 100, pX: arr[o + 1] / 100, p2: arr[o + 2] / 100,
          source: 'Ensemble (Dixon-Coles + ML, pre-calculado)' + (neutral ? ' · sede neutral' : ''),
        };
      }
      const r = dixonColesProbs(home, away, neutral);
      return { p1: r.p1, pX: r.pX, p2: r.p2,
        source: 'Dixon-Coles (forma cerrada)' + (neutral ? ' · sede neutral' : '') };
    }

    function pickFrom(p1, pX, p2, home, away) {
      const opts = [
        { code: '1', label: `Gana ${home}`, prob: p1 },
        { code: 'X', label: 'Empate', prob: pX },
        { code: '2', label: `Gana ${away}`, prob: p2 },
      ];
      const best = opts.reduce((a, b) => (b.prob > a.prob ? b : a));
      const conf = best.prob * 100;
      let level, color;
      if (conf >= 55) { level = 'ALTA'; color = '#34d399'; }
      else if (conf >= 42) { level = 'MEDIA'; color = '#f0b429'; }
      else { level = 'BAJA'; color = '#f87171'; }
      return { ...best, conf, level, color };
    }

    /**
     * Matriz de marcadores P(i goles local, j goles visitante) con la
     * corrección Dixon-Coles para marcadores bajos, renormalizada. Misma
     * λ que se muestra como "goles esperados", así los exactos son coherentes.
     */
    function scorelineMatrix(home, away, neutral) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const ha = neutral ? 0 : model.homeAdvantage;
      const lambdaHome = Math.exp((SH[home] || 0) + (SA[away] || 0) + ha);
      const lambdaAway = Math.exp((SH[away] || 0) + (SA[home] || 0));
      const rho = model.rho, N = 8;
      const ph = [], pa = [];
      for (let i = 0; i < N; i++) { ph.push(poissonPmf(i, lambdaHome)); pa.push(poissonPmf(i, lambdaAway)); }
      const M = []; let s = 0;
      for (let i = 0; i < N; i++) {
        M.push([]);
        for (let j = 0; j < N; j++) {
          let pij = ph[i] * pa[j];
          if (i === 0 && j === 0) pij *= 1 - lambdaHome * lambdaAway * rho;
          else if (i === 0 && j === 1) pij *= 1 + lambdaHome * rho;
          else if (i === 1 && j === 0) pij *= 1 + lambdaAway * rho;
          else if (i === 1 && j === 1) pij *= 1 - rho;
          if (pij < 0) pij = 0;
          M[i][j] = pij; s += pij;
        }
      }
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) M[i][j] /= s;
      return { M, N, lambdaHome, lambdaAway };
    }

    /** Top-5 marcadores exactos más probables desde la matriz Dixon-Coles. */
    function renderExtraStats(home, away, neutral) {
      const { M, N } = scorelineMatrix(home, away, neutral);
      const scores = [];
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
        scores.push({ s: `${i}-${j}`, p: M[i][j] });
      }
      scores.sort((a, b) => b.p - a.p);
      const top = scores.slice(0, 5);
      const max = top[0].p || 1;

      document.getElementById('scoreList').innerHTML = top.map(x => `
        <div class="score-row">
          <span class="score-label">${x.s}</span>
          <span class="bar"><span style="width:${(x.p / max * 100).toFixed(0)}%"></span></span>
          <span class="score-pct">${(x.p * 100).toFixed(1)}%</span>
        </div>`).join('');
    }

    /**
     * Doble chance para partidos parejos (ningún resultado pasa de 45%):
     * combina al favorito con el empate -> 1X (local o empate) o X2 (visitante
     * o empate). Devuelve null si hay un favorito razonable. Probs en fracción.
     */
    function doubleChance(p1, pX, p2) {
      if (Math.max(p1, p2) >= 0.45) return null;
      const homeFav = p1 >= p2;
      return { code: homeFav ? '1X' : 'X2', homeFav, prob: homeFav ? p1 + pX : pX + p2 };
    }

    /**
     * Explica en lenguaje natural por qué salió esa probabilidad y, si está
     * muy ajustado, recomienda las alternativas (otro equipo o empate).
     */
    function explainPrediction(home, away, neutral, r, lam) {
      const ps = [
        { c: '1', team: home, label: `gana ${home}` },
        { c: 'X', team: 'empate', label: 'el empate' },
        { c: '2', team: away, label: `gana ${away}` },
      ].map(o => ({ ...o, p: o.c === '1' ? r.p1 : o.c === 'X' ? r.pX : r.p2 }))
        .sort((a, b) => b.p - a.p);
      const [top, second, third] = ps;
      const margin = (top.p - second.p) * 100;
      const lh = lam.lambdaHome, la = lam.lambdaAway;
      const elo = model.eloRatings || {}, eh = elo[home], ea = elo[away];

      const reasons = [`el modelo espera <b>${lh.toFixed(1)}</b> goles de ${home} y <b>${la.toFixed(1)}</b> de ${away}`];
      if (eh != null && ea != null) {
        const diff = eh - ea, strong = diff >= 0 ? home : away;
        reasons.push(Math.abs(diff) >= 35
          ? `${strong} tiene bastante mejor Elo (${Math.round(eh)} vs ${Math.round(ea)})`
          : `están parejos en Elo (${Math.round(eh)} vs ${Math.round(ea)})`);
      }
      reasons.push(neutral ? 'se juega en sede neutral' : `${home} es local (suma ventaja de localía)`);

      const pct = x => (x.p * 100).toFixed(0) + '%';
      const topName = top.c === 'X' ? 'El empate' : top.team;
      let verdict, cls;
      if (margin >= 18) {
        verdict = `<b>${topName}</b> es el favorito claro (${pct(top)}).`;
        cls = 'clear';
      } else if (margin >= 7) {
        verdict = `Ligera ventaja para <b>${topName}</b> (${pct(top)}), pero el partido está abierto.`;
        cls = 'mid';
      } else {
        verdict = `⚖️ <b>Muy parejo</b>: cualquiera puede pasar. Lo más probable es ${top.label} (${pct(top)}), ` +
          `pero ${second.label} (${pct(second)}) o ${third.label} (${pct(third)}) son alternativas reales — ` +
          `${top.c === 'X' || second.c === 'X' ? 'ojo con el empate' : 'no descartes el empate'}.`;
        cls = 'tight';
      }
      return `<div class="why ${cls}"><b>Por qué:</b> ${reasons.join('; ')}. ${verdict}</div>`;
    }

    /** Carga el modelo de corners/tarjetas. No es fatal si falta. */
    async function loadStatsModel() {
      try {
        const res = await fetch('stats_model.json');
        if (res.ok) statsModel = await res.json();
      } catch (e) { /* sin stats: el botón de detalle no aparece */ }
    }

    let penaltyData = null;   // récord de tandas de penales por selección
    async function loadPenalties() {
      try {
        const res = await fetch('penalties.json');
        if (res.ok) penaltyData = await res.json();
      } catch (e) { /* sin penales: se usa 50/50 */ }
    }
    /** P(A gana la tanda) según el récord histórico de penales (50/50 si falta). */
    function shootoutWinProb(a, b) {
      const t = penaltyData && penaltyData.teams;
      const ra = (t && t[a]) ? t[a].rate : 0.5;
      const rb = (t && t[b]) ? t[b].rate : 0.5;
      return ra / (ra + rb);
    }
    /**
     * Predicción de una llave de eliminación (sede neutral). El empate en los
     * 90'+prórroga se define por penales con el récord de cada equipo:
     *   P(A avanza) = P(A gana) + P(empate) · P(A gana la tanda)
     */
    function koPredict(aTeam, bTeam) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const la = Math.exp((SH[aTeam] || 0) + (SA[bTeam] || 0));
      const lb = Math.exp((SH[bTeam] || 0) + (SA[aTeam] || 0));
      const [p1, pX, p2] = wdl(la, lb);
      const shA = shootoutWinProb(aTeam, bTeam);
      return { aAdv: p1 + pX * shA, pX, shA };
    }

    /** Córners y tarjetas esperadas de un cruce (estimación, sede neutral). */
    function expectedStats(home, away) {
      if (!statsModel || !statsModel.teams[home] || !statsModel.teams[away]) return null;
      const T = statsModel.teams, mc = statsModel.muCorners, mk = statsModel.muCards;
      return {
        cH: mc * T[home].cAtt * T[away].cDef, cA: mc * T[away].cAtt * T[home].cDef,
        kH: mk * T[home].kAtt * T[away].kDef, kA: mk * T[away].kAtt * T[home].kDef,
        nH: T[home].matches, nA: T[away].matches,
      };
    }

    // ---- Motor de apuestas (multi-mercado, sobre probabilidades calibradas) --
    /** P(total > line) para un total ~ Poisson(mean). line tipo 8.5. */
    function poissonOver(mean, line) {
      let cum = 0, k = Math.floor(line);
      for (let i = 0; i <= k; i++) cum += poissonPmf(i, mean);
      return 1 - cum;
    }

    const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

    /**
     * Recomienda 3 apuestas para un partido:
     *  - 🟢 Segura: una sola, alta probabilidad.
     *  - 🟡 Media: COMBINADA de 2 patas positivas (~30-52%).
     *  - 🔴 Complicada: COMBINADA de 3 patas positivas (~8-22%, mucho pago).
     * Las patas salen de TODOS los modelos: resultado, goles, BTTS, córners
     * (total y 1er tiempo), tarjetas y goles de 1er tiempo. La cuota combinada
     * es aproximada (producto de cuotas, asumiendo independencia).
     */
    function recommendBets(home, away, neutral, p1, pX, p2) {
      const { M, N, lambdaHome, lambdaAway } = scorelineMatrix(home, away, neutral);
      let o15 = 0, o25 = 0, btts = 0;
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
        const p = M[i][j], t = i + j;
        if (t >= 2) o15 += p; if (t >= 3) o25 += p;
        if (i >= 1 && j >= 1) btts += p;
      }
      const favHome = p1 >= p2;
      const winP = Math.max(p1, p2), winLbl = `gana ${favHome ? home : away}`;
      const totG = lambdaHome + lambdaAway;
      const fhgShare = statsModel ? (statsModel.firstHalfGoalShare || 0.44) : 0.44;
      const fhcShare = statsModel ? (statsModel.firstHalfCornerShare || 0.46) : 0.46;
      const fhG = totG * fhgShare;
      const st = expectedStats(home, away);
      const totC = st ? st.cH + st.cA : 0, totK = st ? st.kH + st.kA : 0, fhC = totC * fhcShare;

      // ---- Pata segura (una sola) ----
      const singles = [];
      const addS = (p, l) => { if (p > 0.58 && p < 0.95) singles.push({ p, l }); };
      addS(p1 + pX, `${home} o empate (doble 1X)`); addS(pX + p2, `${away} o empate (doble X2)`);
      addS(p1 + p2, 'sin empate (doble 12)'); addS(o15, '+1.5 goles'); addS(1 - o25, '-2.5 goles');
      if (st) { addS(1 - poissonOver(totK, 4.5), '-4.5 tarjetas'); addS(poissonOver(totC, 6.5), '+6.5 córners'); }
      singles.sort((a, b) => b.p - a.p);
      const safe = singles[0] ? { legs: [cap(singles[0].l)], p: singles[0].p }
                              : { legs: [cap(winLbl)], p: winP };

      // ---- Patas para las combinadas (positivas, una por mercado) ----
      const legs = [];
      const L = (mkt, p, label) => { if (p > 0.20 && p < 0.95) legs.push({ mkt, p, label }); };
      L('res', winP, cap(winLbl));
      L('btts', btts, 'ambos marcan');
      L('goals', o15, '+1.5 goles'); L('goals', o25, '+2.5 goles');
      L('fhg', poissonOver(fhG, 0.5), '+0.5 goles 1er tiempo');
      L('fhg', poissonOver(fhG, 1.5), '+1.5 goles 1er tiempo');
      if (st) {
        [7.5, 8.5, 9.5, 10.5].forEach(x => L('corn', poissonOver(totC, x), `+${x} córners`));
        [3.5, 4.5].forEach(x => L('fhc', poissonOver(fhC, x), `+${x} córners 1er tiempo`));
        [2.5, 3.5, 4.5].forEach(x => L('card', poissonOver(totK, x), `+${x} tarjetas`));
      }

      // Mejor combinada de n patas (mercados distintos) con producto en banda.
      function combo(n, lo, hi, center) {
        let best = null;
        (function rec(start, chosen, prod, mkts) {
          if (chosen.length === n) {
            if (prod >= lo && prod <= hi) {
              const hasRes = chosen.some(c => c.mkt === 'res');
              const score = Math.abs(prod - center) - (hasRes ? 0.05 : 0);
              if (!best || score < best.score)
                best = { legs: chosen.map(c => c.label), p: prod, score };
            }
            return;
          }
          for (let i = start; i < legs.length; i++) {
            if (mkts.has(legs[i].mkt)) continue;
            mkts.add(legs[i].mkt); chosen.push(legs[i]);
            rec(i + 1, chosen, prod * legs[i].p, mkts);
            chosen.pop(); mkts.delete(legs[i].mkt);
          }
        })(0, [], 1, new Set());
        return best;
      }
      const media = combo(2, 0.30, 0.52, 0.40);
      const compl = combo(3, 0.08, 0.22, 0.15) || combo(3, 0.06, 0.30, 0.15) || combo(2, 0.18, 0.30, 0.24);
      return { safe, media, compl };
    }

    const fairOdds = p => (1 / p).toFixed(2);
    const TIERS = [['safe', '🟢', 'Segura', 'safe'], ['media', '🟡', 'Media (combinada)', 'medium'],
                   ['compl', '🔴', 'Complicada (combinada)', 'risky']];

    /** Rellena el bloque de apuestas dentro del predictor. */
    function renderPredictorBets(home, away, neutral, r) {
      const block = document.getElementById('betsBlock');
      const b = recommendBets(home, away, neutral, r.p1, r.pX, r.p2);
      const rows = TIERS.map(([k, ic, lbl, cls]) => {
        const bet = b[k];
        if (!bet) return '';
        const pick = bet.legs.join('  +  ');
        return `<div class="bet-row ${cls}">
          <div class="bet-tierhead">${ic} <b>${lbl}</b></div>
          <div class="bet-pick">${pick}</div>
          <div class="bet-num"><b>${(bet.p * 100).toFixed(0)}%</b> · cuota aprox. <b>${fairOdds(bet.p)}</b></div>
        </div>`;
      }).join('');
      block.innerHTML = `
        <div class="bets-title">💰 Apuestas recomendadas</div>
        ${rows}
        <p class="source-note" style="margin-top:8px;">
          Combinadas calculadas con las probabilidades del modelo (resultado, goles, córners y tarjetas
          —total y 1er tiempo—, BTTS). La cuota combinada es <b>aproximada</b>. Solo informativo · apostá con responsabilidad.
        </p>`;
    }

    /** Realiza una predicción y la muestra. */
    function makePrediction() {
      if (!modelReady) return;
      const home = document.getElementById('homeTeam').value;
      const away = document.getElementById('awayTeam').value;
      const neutral = document.getElementById('neutral').checked;

      if (!home || !away || home === away) {
        alert('Selecciona dos equipos diferentes');
        return;
      }

      const r = lookupProbs(home, away, neutral);
      const lam = dixonColesProbs(home, away, neutral);  // λ paramétrico para mostrar
      const best = pickFrom(r.p1, r.pX, r.p2, home, away);

      const rec = document.getElementById('recommendation');
      rec.innerHTML = `PRODE: <span style="color:${best.color}">${best.code}</span> — ${best.label} ` +
        `<span style="font-size:0.7em; color:${best.color}">(${best.conf.toFixed(1)}% · Confianza ${best.level})</span>`;
      rec.style.background = 'rgba(255,255,255,0.04)';
      rec.style.border = `1px solid ${best.color}`;
      const dc = doubleChance(r.p1, r.pX, r.p2);
      if (dc) {
        const dcLabel = dc.homeFav ? `${home} o empate` : `${away} o empate`;
        rec.innerHTML += `<div style="font-size:0.6em; margin-top:8px; color:#34d399; font-weight:700;">` +
          `💡 Pick más seguro: ${dc.code} (${dcLabel}) · ${(dc.prob * 100).toFixed(0)}%</div>`;
      }

      document.getElementById('matchTitle').innerHTML = `${flag(home)} ${home} <span style="color:#555d75">vs</span> ${flag(away)} ${away}`;
      document.getElementById('homeLabel').innerHTML = `${flag(home)} ${home}`;
      document.getElementById('homeProb').textContent = (r.p1 * 100).toFixed(1) + '%';
      document.getElementById('drawProb').textContent = (r.pX * 100).toFixed(1) + '%';
      document.getElementById('awayLabel').innerHTML = `${flag(away)} ${away}`;
      document.getElementById('awayProb').textContent = (r.p2 * 100).toFixed(1) + '%';
      document.getElementById('expectedGoals').textContent =
        `Goles esperados (λ): ${lam.lambdaHome.toFixed(2)} - ${lam.lambdaAway.toFixed(2)}`;
      document.getElementById('why').innerHTML = explainPrediction(home, away, neutral, r, lam);
      renderExtraStats(home, away, neutral);
      renderAnalytics(home, away);
      renderPredictorBets(home, away, neutral, r);
      document.getElementById('sourceNote').textContent =
        `Fuente 1/X/2: ${r.source}. Resultados exactos y mercados: modelo de goles Dixon-Coles.`;

      document.getElementById('resultPanel').classList.remove('hidden');
    }

    /** Cambia de pestaña (Predictor / Fixture / Posiciones / Chances). */

    // ---- Fixture (calendario oficial del Mundial 2026) -----------------
    let fixtureData = null;
    let resultsData = null;   // resultados reales en vivo (results.json)
    let standingsData = null;  // tabla real en vivo (standings.json)
    let fixtureGroup = 'all';  // filtro de grupo del Fixture

    const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const WDAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    function formatDate(iso) {

    /** Resultados reales (en vivo). No es fatal si aún no existe el archivo. */
    async function loadResults() {
      try {
        const res = await fetch('results.json?t=' + Date.now(), { cache: 'no-store' });
        if (res.ok) resultsData = await res.json();
      } catch { /* sin resultados todavía: el fixture se muestra sin tilde */ }

    /**
     * "Qué se juega" un partido por jugar, según la tabla real. Calcula si un
     * triunfo asegura el 1er puesto o la clasificación (top-2), de forma
     * rigurosa: cuenta cuántos rivales pueden alcanzar/superar el piso de puntos
     * del ganador (con las reglas FIFA 2026 ya en la tabla). '' si no aplica.
     */
    function matchStakes(m) {
      if (!standingsData || !standingsData.groups || !standingsData.groups[m.group]) return '';
      const rows = standingsData.groups[m.group];
      const by = {}; rows.forEach(r => (by[r.team] = r));
      const H = by[m.home], A = by[m.away];
      if (!H || !A) return '';
      if (Math.max(...rows.map(r => r.played)) === 0) return '';   // grupo sin jugar

      const evalWin = (winner, loser) => {
        const floor = winner.points + 3;                 // garantizado si gana
        let reach = 0;
        for (const r of rows) {
          if (r.team === winner.team) continue;
          const lostThis = (r.team === loser.team) ? 1 : 0;
          const rMax = r.points + 3 * (3 - r.played - lostThis);   // techo del rival
          if (rMax >= floor) reach++;                     // podría alcanzarlo o superarlo
        }
        if (reach === 0) return 'lider';
        if (reach <= 1) return 'clasifica';
        if (floor >= 6) return 'cerca';
        return null;
      };
      const phrase = (team, code) =>
        code === 'lider' ? `🔑 ${team} gana y se queda con el 1er puesto del grupo`
          : code === 'clasifica' ? `🔑 ${team} gana y asegura el pase a octavos`
            : `${team} gana y queda a un paso de octavos`;
      const rank = { lider: 3, clasifica: 2, cerca: 1 };
      let best = null;
      for (const [t, o] of [[m.home, evalWin(H, A)], [m.away, evalWin(A, H)]]) {
        if (o && (!best || rank[o] > rank[best.code])) best = { team: t, code: o };
      }
      if (best) return phrase(best.team, best.code);
      if (m.matchday === 3) return '🏁 Última fecha — define su clasificación';
      return '';
    }

    /**
     * Cruza un partido del fixture con su resultado real. Devuelve el marcador
     * orientado como el fixture (local/visitante), el resultado 1/X/2 efectivo
     * y si la predicción del modelo acertó. null si todavía no hay marcador.
     */
    function matchResult(m) {
      if (!resultsData || !resultsData.matches) return null;
      const key = [m.home, m.away].sort().join('|');
      const r = resultsData.matches[key];
      if (!r) return null;
      const sameOrder = r.home === m.home;
      const sh = sameOrder ? r.homeGoals : r.awayGoals;
      const sa = sameOrder ? r.awayGoals : r.homeGoals;
      const outcome = sh > sa ? '1' : (sh === sa ? 'X' : '2');
      const finished = r.status === 'FINISHED';
      return { sh, sa, outcome, live: !!r.live, finished, hit: outcome === m.prediction };
    }

    /**
     * Rendimiento acumulado del modelo: recorre los partidos del fixture ya
     * terminados y los compara con la predicción publicada (que ya incluye la
     * ventaja de local de los anfitriones). Consistente con los ✓/✗ por partido.
     * Devuelve aciertos, % y Brier multiclase. null si aún no hay datos.
     */
    function computeTracker(matches) {
      if (!matches) return null;
      let n = 0, hits = 0, brier = 0;
      for (const m of matches) {
        const rr = matchResult(m);
        if (!rr || !rr.finished || m.prob_1 == null) continue;
        n++; if (rr.hit) hits++;
        const p = [m.prob_1 / 100, m.prob_X / 100, m.prob_2 / 100];
        const out = rr.outcome === '1' ? 0 : (rr.outcome === 'X' ? 1 : 2);
        const y = [0, 0, 0]; y[out] = 1;
        brier += p.reduce((s, pi, i) => s + (pi - y[i]) ** 2, 0);
      }
      return n ? { n, hits, acc: hits / n * 100, brier: brier / n } : null;
    }

    /** Chips de filtro por fecha (Todas / 1 / 2 / 3). */
    function renderMatchdayChips() {
      const cont = document.getElementById('fixtureMatchdayFilter');
      const mds = [...new Set(fixtureData.matches.map(m => m.matchday))].sort();
      const chip = (val, label) =>
        `<button class="gchip${fixtureMatchday === val ? ' active' : ''}" data-md="${val}">${label}</button>`;
      cont.innerHTML = chip('all', 'Todas') + mds.map(md => chip(md, 'Fecha ' + md)).join('') + chip('ko', '16avos 🔮');
      cont.querySelectorAll('.gchip').forEach(b => b.addEventListener('click', () => {
        const v = b.dataset.md;
        fixtureMatchday = (v === 'all' || v === 'ko') ? v : +v;
        renderFixture();
      }));
    }

    /** Tarjetas de los 16avos con la predicción del modelo (penal-aware). */
    function renderKnockoutFixture() {
      const built = buildBracketTeams(true);
      if (!built) return '<p class="source-note" style="text-align:center;">Esperando que terminen los grupos para armar los 16avos…</p>';
      const { slot, winner, meta } = built;
      let html = `<p class="source-note" style="margin-top:0; margin-bottom:14px;">
        🔮 <b>16avos de final</b> — predicción del modelo (sede neutral). Los empates se definen por <b>penales</b>
        según el récord de tandas de cada selección (🥅). El marcador real aparece cuando se juegue.</p>`;
      Object.keys(R32).map(Number).sort((a, b) => a - b).forEach(m => {
        const pair = slot[m] || [];
        const a = pair[0], b = pair[1];
        if (!a || !b) return;
        const mt = meta[m] || {}, w = winner[m];
        const seeds = `${seedLabel(R32[m][0])} vs ${seedLabel(R32[m][1])}`;
        const rs = realScore(a.team, b.team);
        const scoreLine = rs ? `<div class="fixture-score">Resultado: <b>${rs[0]} - ${rs[1]}</b></div>` : '';
        let predLine, pickBox;
        if (mt.real) {
          predLine = `<div class="ko-pred done">✅ Avanzó: ${flag(w.team)} <b>${w.team}</b></div>`;
          pickBox = '<div class="verdict ok">✓</div>';
        } else {
          const pen = mt.drawPct > 0.26 ? ` · <span class="bk-pen" title="Si va a penales">🥅 pen ${mt.shootWin}%</span>` : '';
          predLine = `<div class="ko-pred">🔮 Avanza: ${flag(w.team)} <b>${w.team}</b> — ${mt.advPct}%${pen}</div>`;
          pickBox = '<div class="pick-code" style="color:#f0b429">✦</div>';
        }
        html += `<div class="fixture-match">
          <div>
            <div class="fixture-teams">${flag(a.team)} ${a.team} <span style="color:#555d75">vs</span> ${flag(b.team)} ${b.team}</div>
            <div class="fixture-meta">16avos de final · ${seeds}</div>
            ${scoreLine}${predLine}
          </div>
          <div class="fixture-pick">${pickBox}</div>
        </div>`;
      });
      return html;
    }

    function renderFixture() {
      if (!fixtureData) return;
      if (fixtureMatchday === null) fixtureMatchday = fixtureData.matchday || 1;  // arranca en la fecha actual
      const showProbs = document.getElementById('fixtureProbsToggle').checked;
      const container = document.getElementById('fixtureContainer');
      renderMatchdayChips();
      if (fixtureMatchday === 'ko') {       // 16avos: predicción de eliminación
        document.getElementById('fixtureGroupFilter').innerHTML = '';
        container.innerHTML = renderKnockoutFixture();
        return;
      }
      renderGroupChips('fixtureGroupFilter', fixtureGroup, g => { fixtureGroup = g; renderFixture(); });
      const mdLabel = fixtureMatchday === 'all' ? 'Todas las fechas' : 'Fecha ' + fixtureMatchday;
      const filtered = fixtureData.matches
        .filter(m => fixtureMatchday === 'all' || m.matchday === fixtureMatchday)
        .filter(m => fixtureGroup === 'all' || m.group === fixtureGroup);
      const byDate = {};
      filtered.forEach(m => { (byDate[m.date] = byDate[m.date] || []).push(m); });

      // Tracker del modelo sobre lo que está mostrando (esta fecha / filtro).
      const t = computeTracker(filtered);
      const scope = fixtureMatchday === 'all' ? 'en el torneo' : 'en la ' + mdLabel;
      const played = filtered.filter(m => { const rr = matchResult(m); return rr && rr.finished; }).length;
      const tracker = t
        ? `<div class="tracker">
             <span class="t-main">📊 ${t.acc.toFixed(0)}% de acierto ${scope}</span>
             <span class="t-sub"><b>${t.hits}/${t.n}</b> jugados · Brier <b>${t.brier.toFixed(3)}</b>
             (más bajo = mejor) · predicción del modelo vs resultado real</span>
           </div>`
        : `<div class="tracker"><span class="t-sub">📊 ${mdLabel}: todavía no se jugó ningún partido — el acierto aparece cuando arranquen.</span></div>`;
      let html = tracker + `<p class="source-note" style="margin-top:0; margin-bottom:14px;">
        ${mdLabel} · fase de grupos · horarios (cuando hay) en <b>hora de Argentina</b> (UTC-3).
        <span style="color:#34d399">✓</span> = el modelo acertó · <span style="color:#f87171">✗</span> = falló.</p>`;
      Object.keys(byDate).sort().forEach(date => {
        html += `<div class="fixture-day"><div class="fixture-day-header">${formatDate(date)}</div>`;
        byDate[date].forEach(m => {
          const colors = { '1': '#34d399', 'X': '#f0b429', '2': '#22d3ee' };
          const code = m.prediction || '?';
          const conf = m.confidence != null ? m.confidence.toFixed(0) + '%' : '';
          const kick = m.kickoffArg ? `<span class="fixture-kick">${m.kickoffArg}</span> · ` : '';
          const probsLine = (showProbs && m.prob_1 != null)
            ? `<div class="fixture-probs">1: ${m.prob_1}% · X: ${m.prob_X}% · 2: ${m.prob_2}% &nbsp;|&nbsp; λ ${m.expectedGoals}</div>`
            : '';
          // Doble chance para partidos parejos (favorito < 45%).
          const dcF = m.prob_1 != null ? doubleChance(m.prob_1 / 100, m.prob_X / 100, m.prob_2 / 100) : null;
          const dcLine = dcF
            ? `<div class="dc-tip">💡 Parejo · pick seguro <b>${dcF.code}</b> (${dcF.homeFav ? m.home : m.away} o empate · ${(dcF.prob * 100).toFixed(0)}%)</div>`
            : '';

          // Resultado real (en vivo): marcador + tilde/cruz si ya terminó.
          const rr = matchResult(m);
          let scoreLine = '', verdict = '';
          if (rr) {
            const liveTag = rr.live ? ' <span class="live-tag">🔴 EN VIVO</span>' : '';
            scoreLine = `<div class="fixture-score">Resultado: <b>${rr.sh} - ${rr.sa}</b>${liveTag}</div>`;
            if (rr.finished) {
              verdict = rr.hit
                ? `<div class="verdict ok" title="El modelo acertó">✓</div>`
                : `<div class="verdict bad" title="El modelo falló">✗</div>`;
            }
          }
          // "Qué se juega" — solo para partidos que todavía no terminaron.
          const stakes = (rr && rr.finished) ? '' : matchStakes(m);
          const stakesLine = stakes ? `<div class="stakes">${stakes}</div>` : '';

          html += `
            <div class="fixture-match pick-${code}${rr && rr.finished ? (rr.hit ? ' done-ok' : ' done-bad') : ''}">
              <div>
                <div class="fixture-teams">${flag(m.home)} ${m.home} <span style="color:#555d75">vs</span> ${flag(m.away)} ${m.away}</div>
                <div class="fixture-meta">${kick}Grupo ${m.group} · ${m.city}${m.hostTeam ? ` · <span class="host-tag">🏠 ${m.hostTeam} de local</span>` : ''}</div>
                ${scoreLine}
                ${stakesLine}
                ${probsLine}
                ${dcLine}
              </div>
              <div class="fixture-pick">
                <div class="pick-code" style="color:${colors[code] || '#8b92a8'}">${code}</div>
                <div class="pick-conf">${conf}</div>
                ${verdict}
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    /** Tabla de los 12 terceros ordenados; los 8 mejores (verde) clasifican. */

      html += `</table>
