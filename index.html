<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 — Match Predictor (Pre-trained)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1040 50%, #0a0e1a 100%);
      color: #f0f2f8;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(26, 31, 53, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(240, 180, 41, 0.3);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #8b92a8;
      font-size: 1.1em;
      margin-bottom: 20px;
    }

    .status-badge {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(52, 211, 153, 0.2);
      border: 1px solid rgba(52, 211, 153, 0.5);
      border-radius: 20px;
      color: #34d399;
      font-weight: bold;
      font-size: 0.9em;
    }

    .card {
      background: rgba(26, 31, 53, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #8b92a8;
      font-weight: 500;
      font-size: 0.95em;
    }

    select {
      width: 100%;
      padding: 12px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      color: #f0f2f8;
      font-size: 1em;
      cursor: pointer;
    }

    select:hover {
      border-color: rgba(34, 211, 238, 0.6);
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      border: none;
      border-radius: 8px;
      color: #0a0e1a;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(240, 180, 41, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result-box {
      background: rgba(34, 211, 238, 0.1);
      border: 2px solid #22d3ee;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .result-title {
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 15px;
      color: #22d3ee;
    }

    .probability-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 15px;
    }

    .probability-item {
      text-align: center;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .prob-label {
      color: #8b92a8;
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    .prob-value {
      font-size: 1.8em;
      font-weight: bold;
      color: #f0b429;
    }

    .expected-goals {
      padding: 12px;
      background: rgba(52, 211, 153, 0.1);
      border-left: 3px solid #34d399;
      border-radius: 4px;
      color: #34d399;
    }

    #recommendation {
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 10px;
    }

    .source-note {
      text-align: center;
      color: #555d75;
      font-size: 0.8em;
      margin-top: 12px;
    }

    .hidden {
      display: none;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: rgba(26, 31, 53, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #8b92a8;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
      width: auto;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      color: #0a0e1a;
      border-color: transparent;
    }

    .tab-btn:hover { transform: none; box-shadow: none; }

    .fixture-day {
      margin-bottom: 22px;
    }

    .fixture-day-header {
      color: #22d3ee;
      font-weight: 700;
      font-size: 1.05em;
      margin: 0 0 10px 4px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.25);
    }

    .fixture-match {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-left: 4px solid #555d75;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .fixture-teams { font-weight: 600; font-size: 1.02em; }
    .fixture-meta { color: #8b92a8; font-size: 0.8em; margin-top: 3px; }
    .fixture-probs { color: #8b92a8; font-size: 0.82em; margin-top: 5px; }
    .fixture-pick {
      text-align: center;
      min-width: 64px;
    }
    .pick-code { font-size: 1.6em; font-weight: 800; line-height: 1; }
    .pick-conf { font-size: 0.72em; color: #8b92a8; }
    .pick-1 { border-left-color: #34d399 !important; }
    .pick-X { border-left-color: #f0b429 !important; }
    .pick-2 { border-left-color: #22d3ee !important; }

    .fixture-score { color: #f0f2f8; font-size: 0.9em; margin-top: 5px; }
    .fixture-score b { color: #fff; font-size: 1.05em; }
    .live-tag { color: #f87171; font-weight: 700; font-size: 0.82em; }
    .host-tag { color: #34d399; font-weight: 700; }

    .verdict { font-size: 1.5em; font-weight: 900; line-height: 1; margin-top: 4px; }
    .verdict.ok { color: #34d399; }
    .verdict.bad { color: #f87171; }

    /* Tinte sutil del partido ya jugado según si el modelo acertó. */
    .fixture-match.done-ok { background: rgba(52, 211, 153, 0.07); }
    .fixture-match.done-bad { background: rgba(248, 113, 113, 0.07); }

    /* Predictor enriquecido: resultados exactos + mercados. */
    .extra-stats {
      margin-top: 16px;
    }
    .extra-block {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .extra-title {
      color: #8b92a8;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.92em;
    }
    .score-label { width: 64px; font-weight: 700; color: #f0f2f8; }
    .bar {
      flex: 1;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar > span { display: block; height: 100%; background: linear-gradient(90deg, #f0b429, #f59e0b); }
    .score-pct { width: 46px; text-align: right; color: #f0b429; font-weight: 700; }

    /* ---- Tracker de precisión del modelo (Fixture) ---- */
    .tracker {
      background: rgba(52, 211, 153, 0.08);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: baseline;
    }
    .tracker .t-main { font-size: 1.15em; font-weight: 800; color: #34d399; }
    .tracker .t-sub { color: #8b92a8; font-size: 0.85em; }
    .tracker b { color: #f0f2f8; }

    /* ---- Simulador de clasificación (Chances) ---- */
    .chance-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 2px;
      font-size: 0.9em;
    }
    .chance-team { width: 130px; font-weight: 600; color: #f0f2f8; flex-shrink: 0; }
    .chance-adv { width: 42px; text-align: right; font-weight: 800; color: #f0f2f8; }
    .chance-win { width: 64px; text-align: right; color: #8b92a8; font-size: 0.85em; }
    .chance-row.qualify .chance-team { color: #34d399; }

    /* ---- Cuadro / bracket de eliminatorias (proyección) ---- */
    .bracket-round { margin-bottom: 22px; }
    .bracket-round > h3 {
      color: #22d3ee;
      font-size: 1.05em;
      margin: 0 0 10px 2px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.25);
    }
    .ko-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .ko-grid.one { grid-template-columns: 1fr; }
    .ko-match {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 8px;
      overflow: hidden;
    }
    .ko-side {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 11px;
      font-size: 0.9em;
    }
    .ko-side + .ko-side { border-top: 1px solid rgba(255, 255, 255, 0.06); }
    .ko-side .seed { color: #555d75; font-size: 0.78em; font-weight: 700; width: 24px; flex-shrink: 0; }
    .ko-side .name { flex: 1; color: #cdd2e0; }
    .ko-side .wp { color: #8b92a8; font-size: 0.8em; }
    .ko-side.win { background: rgba(52, 211, 153, 0.1); }
    .ko-side.win .name { color: #34d399; font-weight: 800; }
    .ko-side.win .wp { color: #34d399; }

    .champion-banner {
      text-align: center;
      background: linear-gradient(135deg, rgba(240,180,41,0.18), rgba(245,158,11,0.12));
      border: 1px solid rgba(240, 180, 41, 0.5);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 20px;
    }
    .champion-banner .lbl { color: #8b92a8; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em; }
    .champion-banner .team { font-size: 1.8em; font-weight: 900; color: #f0b429; margin-top: 4px; }

    /* ===================== MOBILE (mobile-first pass) ===================== */
    @media (max-width: 600px) {
      body { padding: 12px; }
      header { padding: 20px 14px; margin-bottom: 24px; }
      h1 { font-size: 1.6em; }
      .subtitle { font-size: 0.95em; }
      .card { padding: 16px; }

      /* Pestañas: que no se aprieten ni desborden. */
      .tabs { flex-wrap: wrap; }
      .tab-btn { font-size: 0.9em; padding: 10px; }

      /* Probabilidades 1/X/2 en una sola fila más compacta. */
      .probability-grid { gap: 8px; }
      .probability-item { padding: 10px 6px; }
      .prob-value { font-size: 1.35em; }
      #recommendation { font-size: 1.1em; }

      /* Tablas de posiciones: scroll horizontal en vez de desbordar. */
      .standings-group { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table.standings { min-width: 480px; font-size: 0.82em; }

      /* Fixture: pick un poco más chico. */
      .pick-code { font-size: 1.35em; }
      .verdict { font-size: 1.3em; }
    }

    .fixture-kick {
      color: #f0b429;
      font-weight: 700;
      font-size: 0.82em;
    }

    .standings-group { margin-bottom: 22px; }
    .standings-group h3 {
      color: #22d3ee;
      font-size: 1.05em;
      margin: 0 0 8px 2px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.25);
    }
    table.standings {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86em;
    }
    table.standings th, table.standings td {
      padding: 7px 6px;
      text-align: center;
    }
    table.standings th {
      color: #8b92a8;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    table.standings td.team {
      text-align: left;
      font-weight: 600;
    }
    table.standings td.pts { font-weight: 800; color: #f0b429; }
    table.standings tr.qualify td { background: rgba(52, 211, 153, 0.08); }
    table.standings tr td:first-child { border-left: 3px solid transparent; }
    table.standings tr.qualify td:first-child { border-left-color: #34d399; }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid rgba(240, 180, 41, 0.2);
      border-top: 4px solid #f0b429;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #f87171;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      color: #555d75;
      font-size: 0.85em;
      margin-top: 40px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚽ World Cup 2026 Predictor</h1>
      <p class="subtitle" id="subtitle">Dixon-Coles + ML Ensemble — Pre-entrenado</p>
      <div class="status-badge" id="statusBadge">Cargando...</div>
    </header>

    <div class="card hidden" id="loadingPanel">
      <div class="loading">
        <div class="spinner"></div>
        <p>Cargando modelo entrenado...</p>
      </div>
    </div>

    <div class="tabs hidden" id="tabs">
      <button class="tab-btn active" id="tabBtnPredictor" onclick="showTab('predictor')">🎯 Predictor</button>
      <button class="tab-btn" id="tabBtnFixture" onclick="showTab('fixture')">📅 Fixture</button>
      <button class="tab-btn" id="tabBtnStandings" onclick="showTab('standings')">📊 Posiciones</button>
      <button class="tab-btn" id="tabBtnChances" onclick="showTab('chances')">🔮 Chances</button>
      <button class="tab-btn" id="tabBtnBracket" onclick="showTab('bracket')">🏆 Cuadro</button>
    </div>

    <div class="card hidden" id="formPanel">
      <div class="form-group">
        <label for="homeTeam">Equipo Local:</label>
        <select id="homeTeam"></select>
      </div>

      <div class="form-group">
        <label for="awayTeam">Equipo Visitante:</label>
        <select id="awayTeam"></select>
      </div>

      <div class="form-group" style="display:flex; align-items:center; gap:10px;">
        <input type="checkbox" id="neutral" checked style="width:auto; cursor:pointer;">
        <label for="neutral" style="margin:0; cursor:pointer;">
          Sede neutral (sin ventaja de local) — recomendado para el Mundial
        </label>
      </div>

      <button id="predictBtn" onclick="makePrediction()">Predecir Resultado</button>

      <div id="resultPanel" class="hidden">
        <div class="result-box">
          <div class="result-title" id="matchTitle"></div>

          <div id="recommendation"></div>

          <div class="probability-grid">
            <div class="probability-item">
              <div class="prob-label" id="homeLabel"></div>
              <div class="prob-value" id="homeProb"></div>
            </div>
            <div class="probability-item">
              <div class="prob-label">Empate</div>
              <div class="prob-value" id="drawProb"></div>
            </div>
            <div class="probability-item">
              <div class="prob-label" id="awayLabel"></div>
              <div class="prob-value" id="awayProb"></div>
            </div>
          </div>

          <div class="expected-goals" id="expectedGoals"></div>

          <div id="extraStats" class="extra-stats">
            <div class="extra-block">
              <div class="extra-title">Resultados exactos más probables</div>
              <div id="scoreList" class="score-list"></div>
            </div>
          </div>

          <div class="source-note" id="sourceNote"></div>
        </div>
      </div>

      <div id="errorPanel" class="error hidden"></div>
    </div>

    <div class="card hidden" id="fixturePanel">
      <div class="form-group" style="display:flex; align-items:center; gap:10px;">
        <input type="checkbox" id="fixtureProbsToggle" checked style="width:auto; cursor:pointer;">
        <label for="fixtureProbsToggle" style="margin:0; cursor:pointer;">Mostrar probabilidades 1 / X / 2</label>
      </div>
      <div id="fixtureContainer"></div>
    </div>

    <div class="card hidden" id="standingsPanel">
      <p class="source-note" id="standingsMeta" style="margin-top:0; margin-bottom:16px;"></p>
      <div id="standingsContainer"></div>
    </div>

    <div class="card hidden" id="chancesPanel">
      <p class="source-note" id="chancesMeta" style="margin-top:0; margin-bottom:16px;"></p>
      <div id="chancesContainer"></div>
    </div>

    <div class="card hidden" id="bracketPanel">
      <p class="source-note" id="bracketMeta" style="margin-top:0; margin-bottom:16px;"></p>
      <div id="bracketChampion"></div>
      <div id="bracketContainer"></div>
    </div>

    <footer>
      <p id="footerStats">Cargando modelo…</p>
      <p id="footerAlgo">Dixon-Coles + ML Ensemble · calibrado por temperatura</p>
    </footer>
  </div>

  <script>
    let model = null;
    let modelReady = false;

    /**
     * Carga el modelo preentrenado desde model.json
     */
    async function loadModel() {
      try {
        document.getElementById('loadingPanel').classList.remove('hidden');

        const response = await fetch('model/model.json');
        if (!response.ok) throw new Error('No se pudo cargar model.json');

        const data = await response.json();
        console.log('✓ Modelo cargado:', data.version);

        model = {
          version: data.version,
          teamStrengthHome: data.teamStrengthHome || {},
          teamStrengthAway: data.teamStrengthAway || {},
          homeAdvantage: data.homeAdvantage ?? 0,
          rho: data.rho ?? 0,
          temperature: data.calibrationTemperature ?? 1,
          matchProbabilities: data.matchProbabilities || {},
          validation: data.validation || {},
          totalTrainingSamples: data.totalTrainingSamples,
          teamsCount: data.teamsCount,
        };

        // Lista de equipos: las 48 selecciones clasificadas (con respaldo).
        const teams = (data.coreSquads && data.coreSquads.length)
          ? data.coreSquads.slice()
          : Object.keys(model.teamStrengthHome);
        teams.sort();

        const homeSelect = document.getElementById('homeTeam');
        const awaySelect = document.getElementById('awayTeam');
        teams.forEach(team => {
          homeSelect.appendChild(new Option(team, team));
          awaySelect.appendChild(new Option(team, team));
        });
        if (teams.includes('Argentina')) homeSelect.value = 'Argentina';
        if (teams.includes('Brazil')) awaySelect.value = 'Brazil';
        else if (teams.length > 1) awaySelect.value = teams[1];

        // Textos dinámicos (sin números inventados).
        const v = model.validation;
        if (v.accuracy != null) {
          document.getElementById('subtitle').textContent =
            `Dixon-Coles + ML Ensemble · Precisión real ${v.accuracy}% (holdout 1X2)`;
          document.getElementById('footerStats').textContent =
            `${model.totalTrainingSamples} partidos · ${model.teamsCount} equipos · ` +
            `Acierto ${v.accuracy}% · Brier ${v.brierScore} · LogLoss ${v.logLoss}`;
        }

        modelReady = true;
        document.getElementById('loadingPanel').classList.add('hidden');
        document.getElementById('tabs').classList.remove('hidden');
        document.getElementById('formPanel').classList.remove('hidden');
        const badge = document.getElementById('statusBadge');
        badge.textContent = '✓ Listo';
        badge.style.background = 'rgba(52, 211, 153, 0.2)';
        badge.style.color = '#34d399';

        loadFixture();      // pre-carga en segundo plano
        loadStandings();
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingPanel').classList.add('hidden');
        document.getElementById('errorPanel').classList.remove('hidden');
        document.getElementById('errorPanel').textContent = `Error: ${error.message}`;
      }
    }

    /** Poisson PMF: e^-λ · λ^k / k! (k pequeño, sin desbordes). */
    function poissonPmf(k, lambda) {
      let p = Math.exp(-lambda);
      for (let i = 1; i <= k; i++) p *= lambda / i;
      return p;
    }

    /**
     * Probabilidades 1/X/2 en forma cerrada (Dixon-Coles), corrigiendo los
     * marcadores bajos con rho y aplicando calibración por temperatura.
     * Usa correctamente la DEFENSA del rival (teamStrengthAway = -defensa).
     */
    function dixonColesProbs(home, away, neutral) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const ha = neutral ? 0 : model.homeAdvantage;
      const lambdaHome = Math.exp((SH[home] || 0) + (SA[away] || 0) + ha);
      const lambdaAway = Math.exp((SH[away] || 0) + (SA[home] || 0));
      const rho = model.rho;
      const N = 10;
      const ph = [], pa = [];
      for (let i = 0; i < N; i++) { ph.push(poissonPmf(i, lambdaHome)); pa.push(poissonPmf(i, lambdaAway)); }

      let p1 = 0, pX = 0, p2 = 0;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          let pij = ph[i] * pa[j];
          if (i === 0 && j === 0) pij *= 1 - lambdaHome * lambdaAway * rho;
          else if (i === 0 && j === 1) pij *= 1 + lambdaHome * rho;
          else if (i === 1 && j === 0) pij *= 1 + lambdaAway * rho;
          else if (i === 1 && j === 1) pij *= 1 - rho;
          if (pij < 0) pij = 0;
          if (i > j) p1 += pij; else if (i === j) pX += pij; else p2 += pij;
        }
      }
      const s = p1 + pX + p2;
      p1 /= s; pX /= s; p2 /= s;

      // Temperatura: p^(1/T) renormalizado.
      const T = model.temperature || 1;
      let a = [Math.pow(p1, 1 / T), Math.pow(pX, 1 / T), Math.pow(p2, 1 / T)];
      const sa = a[0] + a[1] + a[2];
      return { p1: a[0] / sa, pX: a[1] / sa, p2: a[2] / sa, lambdaHome, lambdaAway };
    }

    /**
     * Probabilidades 1/X/2 para un cruce. Usa el array pre-calculado del
     * ensemble [p1,pX,p2,p1n,pXn,p2n] si existe; si no, Dixon-Coles en JS.
     */
    function lookupProbs(home, away, neutral) {
      const arr = model.matchProbabilities[`${home}|${away}`];
      if (arr) {
        const o = neutral ? 3 : 0;
        return {
          p1: arr[o] / 100, pX: arr[o + 1] / 100, p2: arr[o + 2] / 100,
          source: 'Ensemble (Dixon-Coles + ML, pre-calculado)' + (neutral ? ' · sede neutral' : ''),
        };
      }
      const r = dixonColesProbs(home, away, neutral);
      return { p1: r.p1, pX: r.pX, p2: r.p2,
        source: 'Dixon-Coles (forma cerrada)' + (neutral ? ' · sede neutral' : '') };
    }

    function pickFrom(p1, pX, p2, home, away) {
      const opts = [
        { code: '1', label: `Gana ${home}`, prob: p1 },
        { code: 'X', label: 'Empate', prob: pX },
        { code: '2', label: `Gana ${away}`, prob: p2 },
      ];
      const best = opts.reduce((a, b) => (b.prob > a.prob ? b : a));
      const conf = best.prob * 100;
      let level, color;
      if (conf >= 55) { level = 'ALTA'; color = '#34d399'; }
      else if (conf >= 42) { level = 'MEDIA'; color = '#f0b429'; }
      else { level = 'BAJA'; color = '#f87171'; }
      return { ...best, conf, level, color };
    }

    /**
     * Matriz de marcadores P(i goles local, j goles visitante) con la
     * corrección Dixon-Coles para marcadores bajos, renormalizada. Misma
     * λ que se muestra como "goles esperados", así los exactos son coherentes.
     */
    function scorelineMatrix(home, away, neutral) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const ha = neutral ? 0 : model.homeAdvantage;
      const lambdaHome = Math.exp((SH[home] || 0) + (SA[away] || 0) + ha);
      const lambdaAway = Math.exp((SH[away] || 0) + (SA[home] || 0));
      const rho = model.rho, N = 8;
      const ph = [], pa = [];
      for (let i = 0; i < N; i++) { ph.push(poissonPmf(i, lambdaHome)); pa.push(poissonPmf(i, lambdaAway)); }
      const M = []; let s = 0;
      for (let i = 0; i < N; i++) {
        M.push([]);
        for (let j = 0; j < N; j++) {
          let pij = ph[i] * pa[j];
          if (i === 0 && j === 0) pij *= 1 - lambdaHome * lambdaAway * rho;
          else if (i === 0 && j === 1) pij *= 1 + lambdaHome * rho;
          else if (i === 1 && j === 0) pij *= 1 + lambdaAway * rho;
          else if (i === 1 && j === 1) pij *= 1 - rho;
          if (pij < 0) pij = 0;
          M[i][j] = pij; s += pij;
        }
      }
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) M[i][j] /= s;
      return { M, N, lambdaHome, lambdaAway };
    }

    /** Top-5 marcadores exactos más probables desde la matriz Dixon-Coles. */
    function renderExtraStats(home, away, neutral) {
      const { M, N } = scorelineMatrix(home, away, neutral);
      const scores = [];
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
        scores.push({ s: `${i}-${j}`, p: M[i][j] });
      }
      scores.sort((a, b) => b.p - a.p);
      const top = scores.slice(0, 5);
      const max = top[0].p || 1;

      document.getElementById('scoreList').innerHTML = top.map(x => `
        <div class="score-row">
          <span class="score-label">${x.s}</span>
          <span class="bar"><span style="width:${(x.p / max * 100).toFixed(0)}%"></span></span>
          <span class="score-pct">${(x.p * 100).toFixed(1)}%</span>
        </div>`).join('');
    }

    /** Realiza una predicción y la muestra. */
    function makePrediction() {
      if (!modelReady) return;
      const home = document.getElementById('homeTeam').value;
      const away = document.getElementById('awayTeam').value;
      const neutral = document.getElementById('neutral').checked;

      if (!home || !away || home === away) {
        alert('Selecciona dos equipos diferentes');
        return;
      }

      const r = lookupProbs(home, away, neutral);
      const lam = dixonColesProbs(home, away, neutral);  // λ paramétrico para mostrar
      const best = pickFrom(r.p1, r.pX, r.p2, home, away);

      const rec = document.getElementById('recommendation');
      rec.innerHTML = `PRODE: <span style="color:${best.color}">${best.code}</span> — ${best.label} ` +
        `<span style="font-size:0.7em; color:${best.color}">(${best.conf.toFixed(1)}% · Confianza ${best.level})</span>`;
      rec.style.background = 'rgba(255,255,255,0.04)';
      rec.style.border = `1px solid ${best.color}`;

      document.getElementById('matchTitle').textContent = `${home} vs ${away}`;
      document.getElementById('homeLabel').textContent = home;
      document.getElementById('homeProb').textContent = (r.p1 * 100).toFixed(1) + '%';
      document.getElementById('drawProb').textContent = (r.pX * 100).toFixed(1) + '%';
      document.getElementById('awayLabel').textContent = away;
      document.getElementById('awayProb').textContent = (r.p2 * 100).toFixed(1) + '%';
      document.getElementById('expectedGoals').textContent =
        `Goles esperados (λ): ${lam.lambdaHome.toFixed(2)} - ${lam.lambdaAway.toFixed(2)}`;
      renderExtraStats(home, away, neutral);
      document.getElementById('sourceNote').textContent =
        `Fuente 1/X/2: ${r.source}. Resultados exactos y mercados: modelo de goles Dixon-Coles.`;

      document.getElementById('resultPanel').classList.remove('hidden');
    }

    /** Cambia de pestaña (Predictor / Fixture / Posiciones / Chances). */
    function showTab(name) {

      const buttons = { predictor: 'tabBtnPredictor', fixture: 'tabBtnFixture', standings: 'tabBtnStandings', chances: 'tabBtnChances', bracket: 'tabBtnBracket' };

      if (name === 'bracket') renderBracket();
    }

    // ---- Fixture (calendario oficial del Mundial 2026) -----------------
    let fixtureData = null;
    let resultsData = null;   // resultados reales en vivo (results.json)

    const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const WDAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    function formatDate(iso) {
      const d = new Date(iso + 'T12:00:00');
      return `${WDAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
    }

    async function loadFixture() {
      try {
        const res = await fetch('fixture.json');
        if (!res.ok) throw new Error('No se pudo cargar fixture.json');

    /** Resultados reales (en vivo). No es fatal si aún no existe el archivo. */
    async function loadResults() {
      try {
        const res = await fetch('results.json?t=' + Date.now(), { cache: 'no-store' });
        if (res.ok) resultsData = await res.json();
      } catch { /* sin resultados todavía: el fixture se muestra sin tilde */ }
    }

    /**
     * Cruza un partido del fixture con su resultado real. Devuelve el marcador
     * orientado como el fixture (local/visitante), el resultado 1/X/2 efectivo
     * y si la predicción del modelo acertó. null si todavía no hay marcador.
     */
    function matchResult(m) {
      if (!resultsData || !resultsData.matches) return null;
      const key = [m.home, m.away].sort().join('|');
      const r = resultsData.matches[key];
      if (!r) return null;
      const sameOrder = r.home === m.home;
      const sh = sameOrder ? r.homeGoals : r.awayGoals;
      const sa = sameOrder ? r.awayGoals : r.homeGoals;
      const outcome = sh > sa ? '1' : (sh === sa ? 'X' : '2');
      const finished = r.status === 'FINISHED';
      return { sh, sa, outcome, live: !!r.live, finished, hit: outcome === m.prediction };
    }

    /**
     * Rendimiento acumulado del modelo: recorre los partidos del fixture ya
     * terminados y los compara con la predicción publicada (que ya incluye la
     * ventaja de local de los anfitriones). Consistente con los ✓/✗ por partido.
     * Devuelve aciertos, % y Brier multiclase. null si aún no hay datos.
     */
    function computeTracker() {
      if (!fixtureData) return null;
      let n = 0, hits = 0, brier = 0;
      for (const m of fixtureData.matches) {
        const rr = matchResult(m);
        if (!rr || !rr.finished || m.prob_1 == null) continue;
        n++; if (rr.hit) hits++;
        const p = [m.prob_1 / 100, m.prob_X / 100, m.prob_2 / 100];
        const out = rr.outcome === '1' ? 0 : (rr.outcome === 'X' ? 1 : 2);
        const y = [0, 0, 0]; y[out] = 1;
        brier += p.reduce((s, pi, i) => s + (pi - y[i]) ** 2, 0);
      }
      return n ? { n, hits, acc: hits / n * 100, brier: brier / n } : null;
    }

    function renderFixture() {
      if (!fixtureData) return;
      const showProbs = document.getElementById('fixtureProbsToggle').checked;
      const container = document.getElementById('fixtureContainer');
      const byDate = {};
      fixtureData.matches.forEach(m => { (byDate[m.date] = byDate[m.date] || []).push(m); });

      // Tracker acumulado del modelo en todo el torneo (results.json).
      const t = computeTracker();
      const tracker = t
        ? `<div class="tracker">
             <span class="t-main">📊 ${t.acc.toFixed(0)}% de acierto</span>
             <span class="t-sub"><b>${t.hits}/${t.n}</b> partidos jugados · Brier <b>${t.brier.toFixed(3)}</b>
             (más bajo = mejor) · predicción del modelo vs resultado real</span>
           </div>`
        : '';

      let html = tracker + `<p class="source-note" style="margin-top:0; margin-bottom:14px;">
        Fecha ${fixtureData.matchday} · horarios en <b>hora de Argentina</b> (UTC-3).
        <span style="color:#34d399">✓</span> = el modelo acertó · <span style="color:#f87171">✗</span> = falló.</p>`;
      Object.keys(byDate).sort().forEach(date => {
        html += `<div class="fixture-day"><div class="fixture-day-header">${formatDate(date)}</div>`;
        byDate[date].forEach(m => {
          const colors = { '1': '#34d399', 'X': '#f0b429', '2': '#22d3ee' };
          const code = m.prediction || '?';
          const conf = m.confidence != null ? m.confidence.toFixed(0) + '%' : '';
          const kick = m.kickoffArg ? `<span class="fixture-kick">${m.kickoffArg}</span> · ` : '';
          const probsLine = (showProbs && m.prob_1 != null)
            ? `<div class="fixture-probs">1: ${m.prob_1}% · X: ${m.prob_X}% · 2: ${m.prob_2}% &nbsp;|&nbsp; λ ${m.expectedGoals}</div>`
            : '';

          // Resultado real (en vivo): marcador + tilde/cruz si ya terminó.
          const rr = matchResult(m);
          let scoreLine = '', verdict = '';
          if (rr) {
            const liveTag = rr.live ? ' <span class="live-tag">🔴 EN VIVO</span>' : '';
            scoreLine = `<div class="fixture-score">Resultado: <b>${rr.sh} - ${rr.sa}</b>${liveTag}</div>`;
            if (rr.finished) {
              verdict = rr.hit
                ? `<div class="verdict ok" title="El modelo acertó">✓</div>`
                : `<div class="verdict bad" title="El modelo falló">✗</div>`;
            }
          }

          html += `
            <div class="fixture-match pick-${code}${rr && rr.finished ? (rr.hit ? ' done-ok' : ' done-bad') : ''}">
              <div>
                <div class="fixture-teams">${m.home} <span style="color:#555d75">vs</span> ${m.away}</div>
                <div class="fixture-meta">${kick}Grupo ${m.group} · ${m.city}${m.hostTeam ? ` · <span class="host-tag">🏠 ${m.hostTeam} de local</span>` : ''}</div>
                ${scoreLine}
                ${probsLine}
              </div>
              <div class="fixture-pick">
                <div class="pick-code" style="color:${colors[code] || '#8b92a8'}">${code}</div>
                <div class="pick-conf">${conf}</div>
                ${verdict}
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    // ---- Simulador de clasificación (Monte Carlo dinámico) --------------
    // Composición oficial de los 12 grupos (sorteo final, dic 2025).
    const GROUPS = {
      A: ['Czech Republic', 'Mexico', 'South Africa', 'South Korea'],
      B: ['Bosnia and Herzegovina', 'Canada', 'Qatar', 'Switzerland'],
      C: ['Brazil', 'Haiti', 'Morocco', 'Scotland'],
      D: ['Australia', 'Paraguay', 'Turkey', 'United States'],
      E: ['Curaçao', 'Ecuador', 'Germany', 'Ivory Coast'],
      F: ['Japan', 'Netherlands', 'Sweden', 'Tunisia'],
      G: ['Belgium', 'Egypt', 'Iran', 'New Zealand'],
      H: ['Cabo Verde', 'Saudi Arabia', 'Spain', 'Uruguay'],
      I: ['France', 'Iraq', 'Norway', 'Senegal'],
      J: ['Algeria', 'Argentina', 'Austria', 'Jordan'],
      K: ['Colombia', 'DR Congo', 'Portugal', 'Uzbekistan'],
      L: ['Croatia', 'England', 'Ghana', 'Panama'],
    };
    const HOST_SET = new Set(['Mexico', 'United States', 'Canada']);
    const SIM_RUNS = 8000;

    /** Muestra Poisson (Knuth) — goles de un equipo dado su λ. */
    function poissonSample(lambda) {
      const L = Math.exp(-lambda);
      let k = 0, p = 1;
      do { k++; p *= Math.random(); } while (p > L);
      return k - 1;
    }

    /** λ de cada lado con ventaja de anfitrión (igual criterio que el fixture). */
    function simLambdas(home, away) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const haH = HOST_SET.has(home) ? model.homeAdvantage : 0;
      const haA = HOST_SET.has(away) ? model.homeAdvantage : 0;
      return [
        Math.exp((SH[home] || 0) + (SA[away] || 0) + haH),
        Math.exp((SH[away] || 0) + (SA[home] || 0) + haA),
      ];
    }

    /** Marcador real [gA, gB] si el partido ya terminó, orientado a (a,b). */
    function realScore(a, b) {
      if (!resultsData || !resultsData.matches) return null;
      const v = resultsData.matches[[a, b].sort().join('|')];
      if (!v || v.status !== 'FINISHED') return null;
      return v.home === a ? [v.homeGoals, v.awayGoals] : [v.awayGoals, v.homeGoals];
    }

    /** Precalcula los 6 cruces de cada grupo: marcador fijo (ya jugado) o λ. */
    function buildSimPlan() {
      const plan = {};
      let played = 0;
      for (const g in GROUPS) {
        const teams = GROUPS[g], matches = [];
        for (let i = 0; i < 4; i++) for (let j = i + 1; j < 4; j++) {
          const a = teams[i], b = teams[j], rs = realScore(a, b);
          if (rs) { matches.push({ a, b, fixed: rs }); played++; }
          else { const [la, lb] = simLambdas(a, b); matches.push({ a, b, la, lb }); }
        }
        plan[g] = { teams, matches };
      }
      return { plan, played };
    }

    /** Corre N simulaciones y agrega % de ganar grupo / clasificar por equipo. */
    function runSimulation(plan, N) {
      const agg = {};
      for (const g in GROUPS) GROUPS[g].forEach(t => (agg[t] = { team: t, group: g, win: 0, adv: 0 }));

      for (let s = 0; s < N; s++) {
        const thirds = [];
        for (const g in plan) {
          const { teams, matches } = plan[g];
          const pts = {}, gd = {}, gf = {};
          teams.forEach(t => { pts[t] = gd[t] = gf[t] = 0; });
          for (const m of matches) {
            const ga = m.fixed ? m.fixed[0] : poissonSample(m.la);
            const gb = m.fixed ? m.fixed[1] : poissonSample(m.lb);
            gf[m.a] += ga; gd[m.a] += ga - gb;
            gf[m.b] += gb; gd[m.b] += gb - ga;
            if (ga > gb) pts[m.a] += 3; else if (ga < gb) pts[m.b] += 3; else { pts[m.a]++; pts[m.b]++; }
          }
          const ranked = teams.slice().sort((x, y) =>
            pts[y] - pts[x] || gd[y] - gd[x] || gf[y] - gf[x] || Math.random() - 0.5);
          agg[ranked[0]].win++; agg[ranked[0]].adv++;   // 1º: gana grupo + clasifica
          agg[ranked[1]].adv++;                          // 2º: clasifica
          thirds.push({ team: ranked[2], pts: pts[ranked[2]], gd: gd[ranked[2]], gf: gf[ranked[2]] });
        }
        // 8 mejores terceros
        thirds.sort((x, y) => y.pts - x.pts || y.gd - x.gd || y.gf - x.gf || Math.random() - 0.5);
        for (let i = 0; i < 8; i++) agg[thirds[i].team].adv++;
      }
      for (const t in agg) { agg[t].winPct = agg[t].win / N * 100; agg[t].advPct = agg[t].adv / N * 100; }
      return agg;
    }

    let chancesKey = '';
    /** Renderiza el simulador; re-corre solo si cambiaron los resultados. */
    function renderChances() {
      if (!modelReady) return;
      const container = document.getElementById('chancesContainer');
      const key = resultsData
        ? (resultsData.updated || '') + ':' + Object.keys(resultsData.matches || {}).length
        : 'none';
      if (key === chancesKey && container.innerHTML) return;   // sin cambios

      container.innerHTML = '<p class="source-note" style="text-align:center;">Simulando 8.000 torneos…</p>';
      // setTimeout para que pinte "Simulando…" antes del cálculo (bloqueante ~1s).
      setTimeout(() => {
        const { plan, played } = buildSimPlan();
        const agg = runSimulation(plan, SIM_RUNS);
        chancesKey = key;
        paintChances(agg, played);
      }, 20);
    }

    function paintChances(agg, played) {
      document.getElementById('chancesMeta').innerHTML =
        `🔮 Simulación Monte Carlo (<b>8.000</b> torneos) de los partidos que faltan, ` +
        `fijando los <b>${played}</b> ya jugados. Se actualiza con cada resultado. ` +
        `<b>%</b> = probabilidad de clasificar (avanzan 2 por grupo + 8 mejores terceros) · ` +
        `🥇 = ganar el grupo.`;
      let html = '';
      for (const g in GROUPS) {
        const rows = GROUPS[g].map(t => agg[t]).sort((a, b) => b.advPct - a.advPct || b.winPct - a.winPct);
        html += `<div class="standings-group"><h3>Grupo ${g}</h3>`;
        rows.forEach((r, i) => {
          const adv = r.advPct, win = r.winPct;
          const grad = adv >= 50 ? '#34d399,#10b981' : (adv >= 20 ? '#f0b429,#f59e0b' : '#8b92a8,#6b7280');
          html += `
            <div class="chance-row${i < 2 ? ' qualify' : ''}">
              <span class="chance-team">${r.team}</span>
              <span class="bar"><span style="width:${adv.toFixed(0)}%; background:linear-gradient(90deg,${grad})"></span></span>
              <span class="chance-adv">${adv.toFixed(0)}%</span>
              <span class="chance-win">🥇 ${win.toFixed(0)}%</span>
            </div>`;
        });
        html += `</div>`;
      }
      document.getElementById('chancesContainer').innerHTML = html;
    }

    // ---- Cuadro de eliminatorias (proyección dinámica) -----------------
    // Estructura oficial WC2026 (números de partido FIFA). 1X = ganador grupo X,
    // 2X = segundo de X, 3@m = mejor tercero asignado al partido m.
    const R32 = {
      73: [['2', 'A'], ['2', 'B']], 74: [['1', 'E'], ['3', 74]], 75: [['1', 'F'], ['2', 'C']],
      76: [['1', 'C'], ['2', 'F']], 77: [['1', 'I'], ['3', 77]], 78: [['2', 'E'], ['2', 'I']],
      79: [['1', 'A'], ['3', 79]], 80: [['1', 'L'], ['3', 80]], 81: [['1', 'D'], ['3', 81]],
      82: [['1', 'G'], ['3', 82]], 83: [['2', 'K'], ['2', 'L']], 84: [['1', 'H'], ['2', 'J']],
      85: [['1', 'B'], ['3', 85]], 86: [['1', 'J'], ['2', 'H']], 87: [['1', 'K'], ['3', 87]],
      88: [['2', 'D'], ['2', 'G']],
    };
    // Grupos elegibles para el tercero de cada llave (tabla FIFA).
    const THIRD_SLOTS = {
      74: ['A', 'B', 'C', 'D', 'F'], 77: ['C', 'D', 'F', 'G', 'H'], 79: ['C', 'E', 'F', 'H', 'I'],
      80: ['E', 'H', 'I', 'J', 'K'], 81: ['B', 'E', 'F', 'I', 'J'], 82: ['A', 'E', 'H', 'I', 'J'],
      85: ['E', 'F', 'G', 'I', 'J'], 87: ['D', 'E', 'I', 'J', 'L'],
    };
    const R16 = { 89: [74, 77], 90: [73, 75], 91: [76, 78], 92: [79, 80], 93: [83, 84], 94: [81, 82], 95: [86, 88], 96: [85, 87] };
    const QF = { 97: [89, 90], 98: [93, 94], 99: [91, 92], 100: [95, 96] };
    const SF = { 101: [97, 98], 102: [99, 100] };
    const FINAL_M = 104, FINAL_SRC = [101, 102];

    /** P(local gana), P(empate), P(visitante gana) de dos λ (Poisson indep.). */
    function wdl(la, lb) {
      const N = 8, A = [], B = [];
      for (let i = 0; i < N; i++) { A.push(poissonPmf(i, la)); B.push(poissonPmf(i, lb)); }
      let pw = 0, pd = 0, pl = 0;
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
        const p = A[i] * B[j];
        if (i > j) pw += p; else if (i === j) pd += p; else pl += p;
      }
      return [pw, pd, pl];
    }

    /** Tabla proyectada por grupo: resultados reales + puntos esperados del resto. */
    function projectGroups() {
      const stand = {}, thirds = [];
      for (const g in GROUPS) {
        const teams = GROUPS[g], xp = {}, xgd = {}, xgf = {};
        teams.forEach(t => { xp[t] = xgd[t] = xgf[t] = 0; });
        for (let i = 0; i < 4; i++) for (let j = i + 1; j < 4; j++) {
          const a = teams[i], b = teams[j], rs = realScore(a, b);
          if (rs) {
            const [ga, gb] = rs;
            xgf[a] += ga; xgd[a] += ga - gb; xgf[b] += gb; xgd[b] += gb - ga;
            if (ga > gb) xp[a] += 3; else if (ga < gb) xp[b] += 3; else { xp[a]++; xp[b]++; }
          } else {
            const [la, lb] = simLambdas(a, b), [pw, pd] = wdl(la, lb), pl = 1 - pw - pd;
            xp[a] += 3 * pw + pd; xp[b] += 3 * pl + pd;
            xgf[a] += la; xgd[a] += la - lb; xgf[b] += lb; xgd[b] += lb - la;
          }
        }
        const ranked = teams.slice().sort((x, y) => xp[y] - xp[x] || xgd[y] - xgd[x] || xgf[y] - xgf[x]);
        stand[g] = ranked.map(t => ({ team: t, group: g, xp: xp[t], xgd: xgd[t], xgf: xgf[t] }));
        thirds.push(stand[g][2]);
      }
      thirds.sort((x, y) => y.xp - x.xp || y.xgd - x.xgd || y.xgf - x.xgf);
      return { stand, qualThirds: thirds.slice(0, 8) };
    }

    /** Asigna los 8 mejores terceros a sus llaves (matching válido por grupo). */
    function assignThirds(qualThirds) {
      const slots = Object.keys(THIRD_SLOTS).map(Number);
      const groups = qualThirds.map(t => t.group);
      const assign = {}, used = new Set();
      (function bt(si) {
        if (si === slots.length) return true;
        for (const grp of THIRD_SLOTS[slots[si]]) {
          if (groups.includes(grp) && !used.has(grp)) {
            assign[slots[si]] = grp; used.add(grp);
            if (bt(si + 1)) return true;
            used.delete(grp); delete assign[slots[si]];
          }
        }
        return false;
      })(0);
      const byGroup = {}; qualThirds.forEach(t => (byGroup[t.group] = t));
      const out = {}; for (const s in assign) out[s] = byGroup[assign[s]];
      return out;
    }

    /** En una llave (neutral) avanza el favorito; empates ~50/50 (penales). */
    function koWinner(a, b) {
      if (!a || !b) return a || b;
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const la = Math.exp((SH[a.team] || 0) + (SA[b.team] || 0));
      const lb = Math.exp((SH[b.team] || 0) + (SA[a.team] || 0));
      const [pw, pd, pl] = wdl(la, lb);
      const pa = pw + pd / 2, pb = pl + pd / 2;
      const w = pa >= pb ? a : b;
      return { ...w, wp: Math.max(pa, pb) };
    }

    /** Proyecta todo el cuadro y devuelve los cruces y ganadores por ronda. */
    function projectBracket() {
      const { stand, qualThirds } = projectGroups();
      const thirdOf = assignThirds(qualThirds);
      const teamOf = ([type, ref]) =>
        type === '1' ? stand[ref][0] : type === '2' ? stand[ref][1] : thirdOf[ref];

      const matchups = {}, winners = {};
      for (const m in R32) {
        const a = teamOf(R32[m][0]), b = teamOf(R32[m][1]);
        matchups[m] = [a, b]; winners[m] = koWinner(a, b);
      }
      const play = def => { for (const m in def) { const a = winners[def[m][0]], b = winners[def[m][1]]; matchups[m] = [a, b]; winners[m] = koWinner(a, b); } };
      play(R16); play(QF); play(SF);
      const fa = winners[FINAL_SRC[0]], fb = winners[FINAL_SRC[1]];
      matchups[FINAL_M] = [fa, fb]; winners[FINAL_M] = koWinner(fa, fb);
      return { matchups, winners, champion: winners[FINAL_M] };
    }

    let bracketKey = '';
    function renderBracket() {
      if (!modelReady) return;
      const key = resultsData
        ? (resultsData.updated || '') + ':' + Object.keys(resultsData.matches || {}).length
        : 'none';
      if (key === bracketKey && document.getElementById('bracketContainer').innerHTML) return;
      bracketKey = key;

      const { matchups, winners, champion } = projectBracket();
      const played = resultsData ? Object.values(resultsData.matches || {}).filter(v => v.status === 'FINISHED').length : 0;

      document.getElementById('bracketMeta').innerHTML =
        `🏆 Cuadro <b>proyectado</b> con los ${played} resultados ya jugados + el modelo. ` +
        `Los puestos de cada grupo salen de la tabla proyectada y en cada llave avanza el favorito ` +
        `(empates a penales ≈ 50/50). Se actualiza con cada resultado.`;

      document.getElementById('bracketChampion').innerHTML = champion ? `
        <div class="champion-banner">
          <div class="lbl">Campeón proyectado</div>
          <div class="team">🏆 ${champion.team}</div>
        </div>` : '';

      const seedLabel = ([type, ref]) => type === '1' ? `1°${ref}` : type === '2' ? `2°${ref}` : '3°';
      const rounds = [
        ['16avos de final', R32, m => [seedLabel(R32[m][0]), seedLabel(R32[m][1])]],
        ['Octavos de final', R16, () => ['', '']],
        ['Cuartos de final', QF, () => ['', '']],
        ['Semifinales', SF, () => ['', '']],
      ];
      let html = '';
      const renderMatch = (m, seeds) => {
        const [a, b] = matchups[m] || [];
        const w = winners[m];
        const side = (t, seed) => {
          if (!t) return `<div class="ko-side"><span class="seed">${seed || ''}</span><span class="name" style="color:#555d75">—</span></div>`;
          const isW = w && w.team === t.team;
          return `<div class="ko-side${isW ? ' win' : ''}">
            <span class="seed">${seed || ''}</span>
            <span class="name">${t.team}</span>
            <span class="wp">${isW ? (w.wp * 100).toFixed(0) + '%' : ''}</span>
          </div>`;
        };
        return `<div class="ko-match">${side(a, seeds[0])}${side(b, seeds[1])}</div>`;
      };
      for (const [title, def, seedFn] of rounds) {
        const ids = Object.keys(def);
        html += `<div class="bracket-round"><h3>${title}</h3><div class="ko-grid">`;
        ids.forEach(m => { html += renderMatch(m, seedFn(m)); });
        html += `</div></div>`;
      }
      // Final
      html += `<div class="bracket-round"><h3>Final</h3><div class="ko-grid one">${renderMatch(FINAL_M, ['', ''])}</div></div>`;
      document.getElementById('bracketContainer').innerHTML = html;
    }

    window.addEventListener('load', () => {
      loadModel();
      document.getElementById('fixtureProbsToggle').addEventListener('change', renderFixture);

      // Refresco en vivo de las posiciones: vuelve a pedir standings.json cada
      // 45 s (solo cuando la pestaña del navegador está visible, para no gastar
      // pedidos de fondo). El workflow live-standings la regenera en el server.
      setInterval(async () => {
        if (!modelReady || document.visibilityState !== 'visible') return;
        loadStandings();
        if (fixtureData) { await loadResults(); renderFixture(); }
        // Si Chances o Cuadro están abiertos, recalculan (solo si cambiaron los resultados).
        if (!document.getElementById('chancesPanel').classList.contains('hidden')) renderChances();
        if (!document.getElementById('bracketPanel').classList.contains('hidden')) renderBracket();
      }, 45000);
    });
  </script>
</body>
