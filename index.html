<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 — Match Predictor (Pre-trained)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #1a1040 50%, #0a0e1a 100%);
      color: #f0f2f8;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      padding: 30px;
      background: rgba(26, 31, 53, 0.8);
      border-radius: 12px;
      border: 1px solid rgba(240, 180, 41, 0.3);
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #8b92a8;
      font-size: 1.1em;
      margin-bottom: 20px;
    }

    .status-badge {
      display: inline-block;
      padding: 10px 20px;
      background: rgba(52, 211, 153, 0.2);
      border: 1px solid rgba(52, 211, 153, 0.5);
      border-radius: 20px;
      color: #34d399;
      font-weight: bold;
      font-size: 0.9em;
    }

    .card {
      background: rgba(26, 31, 53, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #8b92a8;
      font-weight: 500;
      font-size: 0.95em;
    }

    select {
      width: 100%;
      padding: 12px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.3);
      border-radius: 8px;
      color: #f0f2f8;
      font-size: 1em;
      cursor: pointer;
    }

    select:hover {
      border-color: rgba(34, 211, 238, 0.6);
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      border: none;
      border-radius: 8px;
      color: #0a0e1a;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(240, 180, 41, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result-box {
      background: rgba(34, 211, 238, 0.1);
      border: 2px solid #22d3ee;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    .result-title {
      font-size: 1.3em;
      font-weight: bold;
      margin-bottom: 15px;
      color: #22d3ee;
    }

    .probability-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 15px;
    }

    .probability-item {
      text-align: center;
      padding: 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .prob-label {
      color: #8b92a8;
      font-size: 0.85em;
      margin-bottom: 5px;
    }

    .prob-value {
      font-size: 1.8em;
      font-weight: bold;
      color: #f0b429;
    }

    .expected-goals {
      padding: 12px;
      background: rgba(52, 211, 153, 0.1);
      border-left: 3px solid #34d399;
      border-radius: 4px;
      color: #34d399;
    }

    #recommendation {
      text-align: center;
      font-size: 1.5em;
      font-weight: bold;
      margin-bottom: 18px;
      padding: 14px;
      border-radius: 10px;
    }

    .source-note {
      text-align: center;
      color: #555d75;
      font-size: 0.8em;
      margin-top: 12px;
    }

    .hidden {
      display: none;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      padding: 12px;
      background: rgba(26, 31, 53, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #8b92a8;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
      width: auto;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #f0b429, #f59e0b);
      color: #0a0e1a;
      border-color: transparent;
    }

    .tab-btn:hover { transform: none; box-shadow: none; }

    .fixture-day {
      margin-bottom: 22px;
    }

    .fixture-day-header {
      color: #22d3ee;
      font-weight: 700;
      font-size: 1.05em;
      margin: 0 0 10px 4px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.25);
    }

    .fixture-match {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-left: 4px solid #555d75;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .fixture-teams { font-weight: 600; font-size: 1.02em; }
    .fixture-meta { color: #8b92a8; font-size: 0.8em; margin-top: 3px; }
    .fixture-probs { color: #8b92a8; font-size: 0.82em; margin-top: 5px; }
    .fixture-pick {
      text-align: center;
      min-width: 64px;
    }
    .pick-code { font-size: 1.6em; font-weight: 800; line-height: 1; }
    .pick-conf { font-size: 0.72em; color: #8b92a8; }
    .pick-1 { border-left-color: #34d399 !important; }
    .pick-X { border-left-color: #f0b429 !important; }
    .pick-2 { border-left-color: #22d3ee !important; }

    .fixture-score { color: #f0f2f8; font-size: 0.9em; margin-top: 5px; }
    .fixture-score b { color: #fff; font-size: 1.05em; }
    .live-tag { color: #f87171; font-weight: 700; font-size: 0.82em; }

    .verdict { font-size: 1.5em; font-weight: 900; line-height: 1; margin-top: 4px; }
    .verdict.ok { color: #34d399; }
    .verdict.bad { color: #f87171; }

    /* Tinte sutil del partido ya jugado según si el modelo acertó. */
    .fixture-match.done-ok { background: rgba(52, 211, 153, 0.07); }
    .fixture-match.done-bad { background: rgba(248, 113, 113, 0.07); }

    /* Predictor enriquecido: resultados exactos + mercados. */
    .extra-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
    }
    .extra-block {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .extra-title {
      color: #8b92a8;
      font-size: 0.8em;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .score-row, .market-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.92em;
    }
    .score-label, .market-label { width: 64px; font-weight: 700; color: #f0f2f8; }
    .market-label { width: auto; flex: 1; font-weight: 600; color: #cdd2e0; }
    .bar {
      flex: 1;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar > span { display: block; height: 100%; background: linear-gradient(90deg, #f0b429, #f59e0b); }
    .score-pct, .market-pct { width: 46px; text-align: right; color: #f0b429; font-weight: 700; }

    /* ---- Tracker de precisión del modelo (Fixture) ---- */
    .tracker {
      background: rgba(52, 211, 153, 0.08);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: baseline;
    }
    .tracker .t-main { font-size: 1.15em; font-weight: 800; color: #34d399; }
    .tracker .t-sub { color: #8b92a8; font-size: 0.85em; }
    .tracker b { color: #f0f2f8; }

    /* ===================== MOBILE (mobile-first pass) ===================== */
    @media (max-width: 600px) {
      body { padding: 12px; }
      header { padding: 20px 14px; margin-bottom: 24px; }
      h1 { font-size: 1.6em; }
      .subtitle { font-size: 0.95em; }
      .card { padding: 16px; }

      /* Pestañas: que no se aprieten ni desborden. */
      .tabs { flex-wrap: wrap; }
      .tab-btn { font-size: 0.9em; padding: 10px; }

      /* Probabilidades 1/X/2 en una sola fila más compacta. */
      .probability-grid { gap: 8px; }
      .probability-item { padding: 10px 6px; }
      .prob-value { font-size: 1.35em; }
      #recommendation { font-size: 1.1em; }

      /* Predictor enriquecido apilado en mobile. */
      .extra-stats { grid-template-columns: 1fr; }

      /* Tablas de posiciones: scroll horizontal en vez de desbordar. */
      .standings-group { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      table.standings { min-width: 480px; font-size: 0.82em; }

      /* Fixture: pick un poco más chico. */
      .pick-code { font-size: 1.35em; }
      .verdict { font-size: 1.3em; }
    }

    .fixture-kick {
      color: #f0b429;
      font-weight: 700;
      font-size: 0.82em;
    }

    .standings-group { margin-bottom: 22px; }
    .standings-group h3 {
      color: #22d3ee;
      font-size: 1.05em;
      margin: 0 0 8px 2px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(34, 211, 238, 0.25);
    }
    table.standings {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.86em;
    }
    table.standings th, table.standings td {
      padding: 7px 6px;
      text-align: center;
    }
    table.standings th {
      color: #8b92a8;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    table.standings td.team {
      text-align: left;
      font-weight: 600;
    }
    table.standings td.pts { font-weight: 800; color: #f0b429; }
    table.standings tr.qualify td { background: rgba(52, 211, 153, 0.08); }
    table.standings tr td:first-child { border-left: 3px solid transparent; }
    table.standings tr.qualify td:first-child { border-left-color: #34d399; }

    .loading {
      text-align: center;
      padding: 40px;
    }

    .spinner {
      border: 4px solid rgba(240, 180, 41, 0.2);
      border-top: 4px solid #f0b429;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #f87171;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }

    footer {
      text-align: center;
      color: #555d75;
      font-size: 0.85em;
      margin-top: 40px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>⚽ World Cup 2026 Predictor</h1>
      <p class="subtitle" id="subtitle">Dixon-Coles + ML Ensemble — Pre-entrenado</p>
      <div class="status-badge" id="statusBadge">Cargando...</div>
    </header>

    <div class="card hidden" id="loadingPanel">
      <div class="loading">
        <div class="spinner"></div>
        <p>Cargando modelo entrenado...</p>
      </div>
    </div>

    <div class="tabs hidden" id="tabs">
      <button class="tab-btn active" id="tabBtnPredictor" onclick="showTab('predictor')">🎯 Predictor</button>
      <button class="tab-btn" id="tabBtnFixture" onclick="showTab('fixture')">📅 Fixture</button>
      <button class="tab-btn" id="tabBtnStandings" onclick="showTab('standings')">📊 Posiciones</button>
    </div>

    <div class="card hidden" id="formPanel">
      <div class="form-group">
        <label for="homeTeam">Equipo Local:</label>
        <select id="homeTeam"></select>
      </div>

      <div class="form-group">
        <label for="awayTeam">Equipo Visitante:</label>
        <select id="awayTeam"></select>
      </div>

      <div class="form-group" style="display:flex; align-items:center; gap:10px;">
        <input type="checkbox" id="neutral" checked style="width:auto; cursor:pointer;">
        <label for="neutral" style="margin:0; cursor:pointer;">
          Sede neutral (sin ventaja de local) — recomendado para el Mundial
        </label>
      </div>

      <button id="predictBtn" onclick="makePrediction()">Predecir Resultado</button>

      <div id="resultPanel" class="hidden">
        <div class="result-box">
          <div class="result-title" id="matchTitle"></div>

          <div id="recommendation"></div>

          <div class="probability-grid">
            <div class="probability-item">
              <div class="prob-label" id="homeLabel"></div>
              <div class="prob-value" id="homeProb"></div>
            </div>
            <div class="probability-item">
              <div class="prob-label">Empate</div>
              <div class="prob-value" id="drawProb"></div>
            </div>
            <div class="probability-item">
              <div class="prob-label" id="awayLabel"></div>
              <div class="prob-value" id="awayProb"></div>
            </div>
          </div>

          <div class="expected-goals" id="expectedGoals"></div>

          <div id="extraStats" class="extra-stats">
            <div class="extra-block">
              <div class="extra-title">Resultados exactos más probables</div>
              <div id="scoreList" class="score-list"></div>
            </div>
            <div class="extra-block">
              <div class="extra-title">Mercados</div>
              <div id="marketList" class="market-list"></div>
            </div>
          </div>

          <div class="source-note" id="sourceNote"></div>
        </div>
      </div>

      <div id="errorPanel" class="error hidden"></div>
    </div>

    <div class="card hidden" id="fixturePanel">
      <div class="form-group" style="display:flex; align-items:center; gap:10px;">
        <input type="checkbox" id="fixtureProbsToggle" checked style="width:auto; cursor:pointer;">
        <label for="fixtureProbsToggle" style="margin:0; cursor:pointer;">Mostrar probabilidades 1 / X / 2</label>
      </div>
      <div id="fixtureContainer"></div>
    </div>

    <div class="card hidden" id="standingsPanel">
      <p class="source-note" id="standingsMeta" style="margin-top:0; margin-bottom:16px;"></p>
      <div id="standingsContainer"></div>
    </div>

    <footer>
      <p id="footerStats">Cargando modelo…</p>
      <p id="footerAlgo">Dixon-Coles + ML Ensemble · calibrado por temperatura</p>
    </footer>
  </div>

  <script>
    let model = null;
    let modelReady = false;

    /**
     * Carga el modelo preentrenado desde model.json
     */
    async function loadModel() {
      try {
        document.getElementById('loadingPanel').classList.remove('hidden');

        const response = await fetch('model/model.json');
        if (!response.ok) throw new Error('No se pudo cargar model.json');

        const data = await response.json();
        console.log('✓ Modelo cargado:', data.version);

        model = {
          version: data.version,
          teamStrengthHome: data.teamStrengthHome || {},
          teamStrengthAway: data.teamStrengthAway || {},
          homeAdvantage: data.homeAdvantage ?? 0,
          rho: data.rho ?? 0,
          temperature: data.calibrationTemperature ?? 1,
          matchProbabilities: data.matchProbabilities || {},
          validation: data.validation || {},
          totalTrainingSamples: data.totalTrainingSamples,
          teamsCount: data.teamsCount,
        };

        // Lista de equipos: las 48 selecciones clasificadas (con respaldo).
        const teams = (data.coreSquads && data.coreSquads.length)
          ? data.coreSquads.slice()
          : Object.keys(model.teamStrengthHome);
        teams.sort();

        const homeSelect = document.getElementById('homeTeam');
        const awaySelect = document.getElementById('awayTeam');
        teams.forEach(team => {
          homeSelect.appendChild(new Option(team, team));
          awaySelect.appendChild(new Option(team, team));
        });
        if (teams.includes('Argentina')) homeSelect.value = 'Argentina';
        if (teams.includes('Brazil')) awaySelect.value = 'Brazil';
        else if (teams.length > 1) awaySelect.value = teams[1];

        // Textos dinámicos (sin números inventados).
        const v = model.validation;
        if (v.accuracy != null) {
          document.getElementById('subtitle').textContent =
            `Dixon-Coles + ML Ensemble · Precisión real ${v.accuracy}% (holdout 1X2)`;
          document.getElementById('footerStats').textContent =
            `${model.totalTrainingSamples} partidos · ${model.teamsCount} equipos · ` +
            `Acierto ${v.accuracy}% · Brier ${v.brierScore} · LogLoss ${v.logLoss}`;
        }

        modelReady = true;
        document.getElementById('loadingPanel').classList.add('hidden');
        document.getElementById('tabs').classList.remove('hidden');
        document.getElementById('formPanel').classList.remove('hidden');
        const badge = document.getElementById('statusBadge');
        badge.textContent = '✓ Listo';
        badge.style.background = 'rgba(52, 211, 153, 0.2)';
        badge.style.color = '#34d399';

        loadFixture();      // pre-carga en segundo plano
        loadStandings();
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loadingPanel').classList.add('hidden');
        document.getElementById('errorPanel').classList.remove('hidden');
        document.getElementById('errorPanel').textContent = `Error: ${error.message}`;
      }
    }

    /** Poisson PMF: e^-λ · λ^k / k! (k pequeño, sin desbordes). */
    function poissonPmf(k, lambda) {
      let p = Math.exp(-lambda);
      for (let i = 1; i <= k; i++) p *= lambda / i;
      return p;
    }

    /**
     * Probabilidades 1/X/2 en forma cerrada (Dixon-Coles), corrigiendo los
     * marcadores bajos con rho y aplicando calibración por temperatura.
     * Usa correctamente la DEFENSA del rival (teamStrengthAway = -defensa).
     */
    function dixonColesProbs(home, away, neutral) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const ha = neutral ? 0 : model.homeAdvantage;
      const lambdaHome = Math.exp((SH[home] || 0) + (SA[away] || 0) + ha);
      const lambdaAway = Math.exp((SH[away] || 0) + (SA[home] || 0));
      const rho = model.rho;
      const N = 10;
      const ph = [], pa = [];
      for (let i = 0; i < N; i++) { ph.push(poissonPmf(i, lambdaHome)); pa.push(poissonPmf(i, lambdaAway)); }

      let p1 = 0, pX = 0, p2 = 0;
      for (let i = 0; i < N; i++) {
        for (let j = 0; j < N; j++) {
          let pij = ph[i] * pa[j];
          if (i === 0 && j === 0) pij *= 1 - lambdaHome * lambdaAway * rho;
          else if (i === 0 && j === 1) pij *= 1 + lambdaHome * rho;
          else if (i === 1 && j === 0) pij *= 1 + lambdaAway * rho;
          else if (i === 1 && j === 1) pij *= 1 - rho;
          if (pij < 0) pij = 0;
          if (i > j) p1 += pij; else if (i === j) pX += pij; else p2 += pij;
        }
      }
      const s = p1 + pX + p2;
      p1 /= s; pX /= s; p2 /= s;

      // Temperatura: p^(1/T) renormalizado.
      const T = model.temperature || 1;
      let a = [Math.pow(p1, 1 / T), Math.pow(pX, 1 / T), Math.pow(p2, 1 / T)];
      const sa = a[0] + a[1] + a[2];
      return { p1: a[0] / sa, pX: a[1] / sa, p2: a[2] / sa, lambdaHome, lambdaAway };
    }

    /**
     * Probabilidades 1/X/2 para un cruce. Usa el array pre-calculado del
     * ensemble [p1,pX,p2,p1n,pXn,p2n] si existe; si no, Dixon-Coles en JS.
     */
    function lookupProbs(home, away, neutral) {
      const arr = model.matchProbabilities[`${home}|${away}`];
      if (arr) {
        const o = neutral ? 3 : 0;
        return {
          p1: arr[o] / 100, pX: arr[o + 1] / 100, p2: arr[o + 2] / 100,
          source: 'Ensemble (Dixon-Coles + ML, pre-calculado)' + (neutral ? ' · sede neutral' : ''),
        };
      }
      const r = dixonColesProbs(home, away, neutral);
      return { p1: r.p1, pX: r.pX, p2: r.p2,
        source: 'Dixon-Coles (forma cerrada)' + (neutral ? ' · sede neutral' : '') };
    }

    function pickFrom(p1, pX, p2, home, away) {
      const opts = [
        { code: '1', label: `Gana ${home}`, prob: p1 },
        { code: 'X', label: 'Empate', prob: pX },
        { code: '2', label: `Gana ${away}`, prob: p2 },
      ];
      const best = opts.reduce((a, b) => (b.prob > a.prob ? b : a));
      const conf = best.prob * 100;
      let level, color;
      if (conf >= 55) { level = 'ALTA'; color = '#34d399'; }
      else if (conf >= 42) { level = 'MEDIA'; color = '#f0b429'; }
      else { level = 'BAJA'; color = '#f87171'; }
      return { ...best, conf, level, color };
    }

    /**
     * Matriz de marcadores P(i goles local, j goles visitante) con la
     * corrección Dixon-Coles para marcadores bajos, renormalizada. Misma
     * λ que se muestra como "goles esperados", así los exactos son coherentes.
     */
    function scorelineMatrix(home, away, neutral) {
      const SH = model.teamStrengthHome, SA = model.teamStrengthAway;
      const ha = neutral ? 0 : model.homeAdvantage;
      const lambdaHome = Math.exp((SH[home] || 0) + (SA[away] || 0) + ha);
      const lambdaAway = Math.exp((SH[away] || 0) + (SA[home] || 0));
      const rho = model.rho, N = 8;
      const ph = [], pa = [];
      for (let i = 0; i < N; i++) { ph.push(poissonPmf(i, lambdaHome)); pa.push(poissonPmf(i, lambdaAway)); }
      const M = []; let s = 0;
      for (let i = 0; i < N; i++) {
        M.push([]);
        for (let j = 0; j < N; j++) {
          let pij = ph[i] * pa[j];
          if (i === 0 && j === 0) pij *= 1 - lambdaHome * lambdaAway * rho;
          else if (i === 0 && j === 1) pij *= 1 + lambdaHome * rho;
          else if (i === 1 && j === 0) pij *= 1 + lambdaAway * rho;
          else if (i === 1 && j === 1) pij *= 1 - rho;
          if (pij < 0) pij = 0;
          M[i][j] = pij; s += pij;
        }
      }
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) M[i][j] /= s;
      return { M, N, lambdaHome, lambdaAway };
    }

    /** Top-5 marcadores exactos + mercados O/U 2.5 y BTTS desde la matriz. */
    function renderExtraStats(home, away, neutral) {
      const { M, N } = scorelineMatrix(home, away, neutral);
      const scores = [];
      let over = 0, btts = 0;
      for (let i = 0; i < N; i++) for (let j = 0; j < N; j++) {
        scores.push({ s: `${i}-${j}`, p: M[i][j] });
        if (i + j >= 3) over += M[i][j];
        if (i >= 1 && j >= 1) btts += M[i][j];
      }
      scores.sort((a, b) => b.p - a.p);
      const top = scores.slice(0, 5);
      const max = top[0].p || 1;

      document.getElementById('scoreList').innerHTML = top.map(x => `
        <div class="score-row">
          <span class="score-label">${x.s}</span>
          <span class="bar"><span style="width:${(x.p / max * 100).toFixed(0)}%"></span></span>
          <span class="score-pct">${(x.p * 100).toFixed(1)}%</span>
        </div>`).join('');

      const markets = [
        { label: 'Más de 2.5 goles', p: over },
        { label: 'Menos de 2.5 goles', p: 1 - over },
        { label: 'Ambos marcan (BTTS)', p: btts },
      ];
      document.getElementById('marketList').innerHTML = markets.map(m => `
        <div class="market-row">
          <span class="market-label">${m.label}</span>
          <span class="bar"><span style="width:${(m.p * 100).toFixed(0)}%"></span></span>
          <span class="market-pct">${(m.p * 100).toFixed(0)}%</span>
        </div>`).join('');
    }

    /** Realiza una predicción y la muestra. */
    function makePrediction() {
      if (!modelReady) return;
      const home = document.getElementById('homeTeam').value;
      const away = document.getElementById('awayTeam').value;
      const neutral = document.getElementById('neutral').checked;

      if (!home || !away || home === away) {
        alert('Selecciona dos equipos diferentes');
        return;
      }

      const r = lookupProbs(home, away, neutral);
      const lam = dixonColesProbs(home, away, neutral);  // λ paramétrico para mostrar
      const best = pickFrom(r.p1, r.pX, r.p2, home, away);

      const rec = document.getElementById('recommendation');
      rec.innerHTML = `PRODE: <span style="color:${best.color}">${best.code}</span> — ${best.label} ` +
        `<span style="font-size:0.7em; color:${best.color}">(${best.conf.toFixed(1)}% · Confianza ${best.level})</span>`;
      rec.style.background = 'rgba(255,255,255,0.04)';
      rec.style.border = `1px solid ${best.color}`;

      document.getElementById('matchTitle').textContent = `${home} vs ${away}`;
      document.getElementById('homeLabel').textContent = home;
      document.getElementById('homeProb').textContent = (r.p1 * 100).toFixed(1) + '%';
      document.getElementById('drawProb').textContent = (r.pX * 100).toFixed(1) + '%';
      document.getElementById('awayLabel').textContent = away;
      document.getElementById('awayProb').textContent = (r.p2 * 100).toFixed(1) + '%';
      document.getElementById('expectedGoals').textContent =
        `Goles esperados (λ): ${lam.lambdaHome.toFixed(2)} - ${lam.lambdaAway.toFixed(2)}`;
      renderExtraStats(home, away, neutral);
      document.getElementById('sourceNote').textContent =
        `Fuente 1/X/2: ${r.source}. Resultados exactos y mercados: modelo de goles Dixon-Coles.`;

      document.getElementById('resultPanel').classList.remove('hidden');
    }

    /** Cambia de pestaña (Predictor / Fixture / Posiciones). */
    function showTab(name) {
      const panels = { predictor: 'formPanel', fixture: 'fixturePanel', standings: 'standingsPanel' };
      const buttons = { predictor: 'tabBtnPredictor', fixture: 'tabBtnFixture', standings: 'tabBtnStandings' };
      for (const [k, id] of Object.entries(panels)) {
        document.getElementById(id).classList.toggle('hidden', k !== name);
        document.getElementById(buttons[k]).classList.toggle('active', k === name);
      }
    }

    // ---- Fixture (calendario oficial del Mundial 2026) -----------------
    let fixtureData = null;
    let resultsData = null;   // resultados reales en vivo (results.json)

    const MONTHS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    const WDAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    function formatDate(iso) {
      const d = new Date(iso + 'T12:00:00');
      return `${WDAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;
    }

    async function loadFixture() {
      try {
        const res = await fetch('fixture.json');
        if (!res.ok) throw new Error('No se pudo cargar fixture.json');
        fixtureData = await res.json();
        await loadResults();   // trae los resultados antes de pintar
        renderFixture();
      } catch (e) {
        document.getElementById('fixtureContainer').innerHTML =
          `<p style="color:#f87171; text-align:center;">No se pudo cargar el fixture (${e.message}).</p>`;
      }
    }

    /** Resultados reales (en vivo). No es fatal si aún no existe el archivo. */
    async function loadResults() {
      try {
        const res = await fetch('results.json?t=' + Date.now(), { cache: 'no-store' });
        if (res.ok) resultsData = await res.json();
      } catch { /* sin resultados todavía: el fixture se muestra sin tilde */ }
    }

    /**
     * Cruza un partido del fixture con su resultado real. Devuelve el marcador
     * orientado como el fixture (local/visitante), el resultado 1/X/2 efectivo
     * y si la predicción del modelo acertó. null si todavía no hay marcador.
     */
    function matchResult(m) {
      if (!resultsData || !resultsData.matches) return null;
      const key = [m.home, m.away].sort().join('|');
      const r = resultsData.matches[key];
      if (!r) return null;
      const sameOrder = r.home === m.home;
      const sh = sameOrder ? r.homeGoals : r.awayGoals;
      const sa = sameOrder ? r.awayGoals : r.homeGoals;
      const outcome = sh > sa ? '1' : (sh === sa ? 'X' : '2');
      const finished = r.status === 'FINISHED';
      return { sh, sa, outcome, live: !!r.live, finished, hit: outcome === m.prediction };
    }

    /** Probabilidades neutrales [p1,pX,p2] del modelo para un cruce cualquiera. */
    function modelNeutralProbs(home, away) {
      let a = model.matchProbabilities[`${home}|${away}`];
      if (a) return [a[3] / 100, a[4] / 100, a[5] / 100];
      a = model.matchProbabilities[`${away}|${home}`];      // orden invertido
      if (a) return [a[5] / 100, a[4] / 100, a[3] / 100];    // y swap 1<->2
      const r = dixonColesProbs(home, away, true);
      return [r.p1, r.pX, r.p2];
    }

    /**
     * Rendimiento acumulado del modelo en TODO el torneo: recorre los partidos
     * ya terminados (results.json) y los compara con la predicción neutral del
     * modelo. Devuelve aciertos, % y Brier multiclase. null si aún no hay datos.
     */
    function computeTracker() {
      if (!resultsData || !resultsData.matches) return null;
      let n = 0, hits = 0, brier = 0;
      for (const key in resultsData.matches) {
        const v = resultsData.matches[key];
        if (v.status !== 'FINISHED') continue;
        const p = modelNeutralProbs(v.home, v.away);
        const out = v.homeGoals > v.awayGoals ? 0 : (v.homeGoals === v.awayGoals ? 1 : 2);
        const pick = p.indexOf(Math.max(...p));
        n++; if (pick === out) hits++;
        const y = [0, 0, 0]; y[out] = 1;
        brier += p.reduce((s, pi, i) => s + (pi - y[i]) ** 2, 0);
      }
      return n ? { n, hits, acc: hits / n * 100, brier: brier / n } : null;
    }

    function renderFixture() {
      if (!fixtureData) return;
      const showProbs = document.getElementById('fixtureProbsToggle').checked;
      const container = document.getElementById('fixtureContainer');
      const byDate = {};
      fixtureData.matches.forEach(m => { (byDate[m.date] = byDate[m.date] || []).push(m); });

      // Tracker acumulado del modelo en todo el torneo (results.json).
      const t = computeTracker();
      const tracker = t
        ? `<div class="tracker">
             <span class="t-main">📊 ${t.acc.toFixed(0)}% de acierto</span>
             <span class="t-sub"><b>${t.hits}/${t.n}</b> partidos jugados · Brier <b>${t.brier.toFixed(3)}</b>
             (más bajo = mejor) · predicción neutral del modelo vs resultado real</span>
           </div>`
        : '';

      let html = tracker + `<p class="source-note" style="margin-top:0; margin-bottom:14px;">
        Fecha ${fixtureData.matchday} · horarios en <b>hora de Argentina</b> (UTC-3).
        <span style="color:#34d399">✓</span> = el modelo acertó · <span style="color:#f87171">✗</span> = falló.</p>`;
      Object.keys(byDate).sort().forEach(date => {
        html += `<div class="fixture-day"><div class="fixture-day-header">${formatDate(date)}</div>`;
        byDate[date].forEach(m => {
          const colors = { '1': '#34d399', 'X': '#f0b429', '2': '#22d3ee' };
          const code = m.prediction || '?';
          const conf = m.confidence != null ? m.confidence.toFixed(0) + '%' : '';
          const kick = m.kickoffArg ? `<span class="fixture-kick">${m.kickoffArg}</span> · ` : '';
          const probsLine = (showProbs && m.prob_1 != null)
            ? `<div class="fixture-probs">1: ${m.prob_1}% · X: ${m.prob_X}% · 2: ${m.prob_2}% &nbsp;|&nbsp; λ ${m.expectedGoals}</div>`
            : '';

          // Resultado real (en vivo): marcador + tilde/cruz si ya terminó.
          const rr = matchResult(m);
          let scoreLine = '', verdict = '';
          if (rr) {
            const liveTag = rr.live ? ' <span class="live-tag">🔴 EN VIVO</span>' : '';
            scoreLine = `<div class="fixture-score">Resultado: <b>${rr.sh} - ${rr.sa}</b>${liveTag}</div>`;
            if (rr.finished) {
              verdict = rr.hit
                ? `<div class="verdict ok" title="El modelo acertó">✓</div>`
                : `<div class="verdict bad" title="El modelo falló">✗</div>`;
            }
          }

          html += `
            <div class="fixture-match pick-${code}${rr && rr.finished ? (rr.hit ? ' done-ok' : ' done-bad') : ''}">
              <div>
                <div class="fixture-teams">${m.home} <span style="color:#555d75">vs</span> ${m.away}</div>
                <div class="fixture-meta">${kick}Grupo ${m.group} · ${m.city}</div>
                ${scoreLine}
                ${probsLine}
              </div>
              <div class="fixture-pick">
                <div class="pick-code" style="color:${colors[code] || '#8b92a8'}">${code}</div>
                <div class="pick-conf">${conf}</div>
                ${verdict}
              </div>
            </div>`;
        });
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    // ---- Posiciones (tabla de grupos, en vivo desde football-data.org) ---
    async function loadStandings() {
      try {
        // Cache-busting: el CDN de Pages podría servir una copia vieja.
        const res = await fetch('standings.json?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('No se pudo cargar standings.json');
        const data = await res.json();
        renderStandings(data);
      } catch (e) {
        document.getElementById('standingsContainer').innerHTML =
          `<p style="color:#f87171; text-align:center;">No se pudo cargar las posiciones (${e.message}).</p>`;
      }
    }

    /** Formatea un ISO a hora local "HH:MM:SS". */
    function formatTime(iso) {
      try {
        return new Date(iso).toLocaleTimeString('es-AR', { hour12: false });
      } catch { return iso || ''; }
    }

    function renderStandings(data) {
      const meta = document.getElementById('standingsMeta');
      const live = !!data.live;
      const dot = live
        ? `<span style="color:#f87171;">🔴 EN VIVO</span> · datos de ${data.source || 'football-data.org'} · `
        : '';
      const stamp = data.updated ? `actualizado ${formatTime(data.updated)} · ` : '';
      meta.innerHTML = `${dot}${stamp}${data.matchesPlayed} partidos de grupos jugados. ` +
        `Los 2 primeros de cada grupo (verde) avanzan, más los 8 mejores terceros.`;
      const container = document.getElementById('standingsContainer');
      let html = '';
      Object.keys(data.groups).sort().forEach(g => {
        html += `<div class="standings-group"><h3>Grupo ${g}</h3>
          <table class="standings">
            <tr><th class="team" style="text-align:left">Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>Pts</th></tr>`;
        data.groups[g].forEach((r, i) => {
          const cls = i < 2 ? 'qualify' : '';
          const gd = (r.gd > 0 ? '+' : '') + r.gd;
          html += `<tr class="${cls}">
            <td class="team">${r.team}</td><td>${r.played}</td><td>${r.won}</td><td>${r.drawn}</td>
            <td>${r.lost}</td><td>${r.gf}</td><td>${r.ga}</td><td>${gd}</td><td class="pts">${r.points}</td></tr>`;
        });
        html += `</table></div>`;
      });
      container.innerHTML = html;
    }

    window.addEventListener('load', () => {
      loadModel();
      document.getElementById('fixtureProbsToggle').addEventListener('change', renderFixture);

      // Refresco en vivo de las posiciones: vuelve a pedir standings.json cada
      // 45 s (solo cuando la pestaña del navegador está visible, para no gastar
      // pedidos de fondo). El workflow live-standings la regenera en el server.
      setInterval(async () => {
        if (!modelReady || document.visibilityState !== 'visible') return;
        loadStandings();
        if (fixtureData) { await loadResults(); renderFixture(); }
      }, 45000);
    });
  </script>
</body>
